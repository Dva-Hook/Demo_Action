name: 清理工作流运行记录

on:
  workflow_dispatch:
    inputs:
      workflow_name:
        type: string
        description: '输入 "all" 清理全部工作流，或输入工作流名称清理指定工作流'
        required: true
        default: 'all'
      count:
        description: '每个工作流最多清理的运行次数'
        required: false
        default: '20'
      delete_failed:
        description: '删除失败的运行记录？'
        required: false
        type: boolean
        default: true
      delete_success:
        description: '删除成功的运行记录？'
        required: false
        type: boolean
        default: false
      delete_cancelled:
        description: '删除已取消的运行记录？'
        required: false
        type: boolean
        default: true
      reverse_order:
        description: '从旧到新开始清理？'
        required: false
        type: boolean
        default: true

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: 安装 GitHub CLI 和 jq
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: 认证 GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: 清理工作流运行记录
        env:
          REPO: ${{ github.repository }}
          COUNT: ${{ inputs.count }}
          DELETE_FAILED: ${{ inputs.delete_failed }}
          DELETE_SUCCESS: ${{ inputs.delete_success }}
          DELETE_CANCELLED: ${{ inputs.delete_cancelled }}
          REVERSE_ORDER: ${{ inputs.reverse_order }}
          WORKFLOW_INPUT: ${{ inputs.workflow_name }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -e

          echo "当前仓库：$REPO"
          echo "========================================="

          # 根据用户输入确定要清理的工作流列表
          if [[ "$WORKFLOW_INPUT" == "all" ]]; then
            echo "模式：清理全部工作流"
            # 获取所有工作流名称（排除本工作流自身，最后单独处理）
            WORKFLOW_NAMES=$(gh api "repos/$REPO/actions/workflows" \
              | jq -r '.workflows[] | select(.name != "清理工作流运行记录") | .name')
            if [ -z "$WORKFLOW_NAMES" ]; then
              echo "未找到任何工作流。"
            fi
          else
            echo "模式：清理指定工作流"
            WORKFLOW_NAMES="$WORKFLOW_INPUT"
          fi

          # 通用的清理函数
          cleanup_workflow() {
            local WF_NAME="$1"
            echo ""
            echo "========================================="
            echo ">>> 正在处理工作流: $WF_NAME"

            local WF_ID=$(gh api "repos/$REPO/actions/workflows" \
              | jq -r ".workflows[] | select(.name == \"$WF_NAME\") | .id")
            if [ -z "$WF_ID" ]; then
              echo "⚠ 未找到工作流 \"$WF_NAME\"，跳过。"
              return 1
            fi
            echo "工作流 ID: $WF_ID"

            # 分页获取所有运行记录
            echo "正在分页获取所有运行记录..."
            local PER_PAGE=100
            local PAGE=1
            local MATCHED_RUNS="[]"
            while true; do
              RESP=$(gh api "repos/$REPO/actions/workflows/$WF_ID/runs?per_page=$PER_PAGE&page=$PAGE")
              RUNS=$(echo "$RESP" | jq '.workflow_runs')
              COUNT_THIS_PAGE=$(echo "$RUNS" | jq 'length')

              if [ "$COUNT_THIS_PAGE" -eq 0 ]; then
                break
              fi

              MATCHED_RUNS=$(jq -s 'add' <(echo "$MATCHED_RUNS") <(echo "$RUNS"))
              PAGE=$((PAGE + 1))
            done

            local TOTAL=$(echo "$MATCHED_RUNS" | jq 'length')
            echo "共获取到 $TOTAL 条运行记录。"

            if [ "$TOTAL" -eq 0 ]; then
              echo "没有运行记录，跳过。"
              return 0
            fi

            # 排序
            if [[ "$REVERSE_ORDER" == "true" ]]; then
              SORTED_RUNS=$(echo "$MATCHED_RUNS" | jq 'sort_by(.run_started_at)')
            else
              SORTED_RUNS=$(echo "$MATCHED_RUNS" | jq 'sort_by(.run_started_at) | reverse')
            fi

            # 取前 N 条
            TO_DELETE_RUNS=$(echo "$SORTED_RUNS" | jq ".[0:${COUNT}]")

            local DELETED=0
            local SKIPPED=0
            echo "$TO_DELETE_RUNS" | jq -c '.[]' | while IFS= read -r run; do
              ID=$(echo "$run" | jq -r '.id')
              STATUS=$(echo "$run" | jq -r '.conclusion')
              STATE=$(echo "$run" | jq -r '.status')

              if [[ "$STATE" == "in_progress" || "$STATE" == "queued" ]]; then
                echo "  跳过运行 ID: $ID（状态为 $STATE）"
                SKIPPED=$((SKIPPED + 1))
                continue
              fi

              if [[ "$STATUS" == "failure" && "$DELETE_FAILED" != "true" ]]; then continue; fi
              if [[ "$STATUS" == "success" && "$DELETE_SUCCESS" != "true" ]]; then continue; fi
              if [[ "$STATUS" == "cancelled" && "$DELETE_CANCELLED" != "true" ]]; then continue; fi

              echo "  删除运行记录 ID: $ID (状态: $STATUS)"
              gh api -X DELETE "repos/$REPO/actions/runs/$ID" || echo "  删除失败"
            done

            echo "完成: $WF_NAME"
          }

          # 遍历所有目标工作流并清理
          DELETED_TOTAL=0
          while IFS= read -r wf_name; do
            [ -z "$wf_name" ] && continue
            cleanup_workflow "$wf_name"
          done <<< "$WORKFLOW_NAMES"

          # 最后清理本工作流自身的旧运行记录
          echo ""
          echo "========================================="
          echo ">>> 清理本工作流（清理工作流运行记录）的旧运行记录..."
          SELF_WORKFLOW_ID=$(gh api "repos/$REPO/actions/workflows" \
            | jq -r '.workflows[] | select(.name == "清理工作流运行记录") | .id')
          if [ -n "$SELF_WORKFLOW_ID" ]; then
            gh api "repos/$REPO/actions/workflows/$SELF_WORKFLOW_ID/runs?per_page=50" \
              | jq -c '.workflow_runs[]' \
              | while IFS= read -r run; do
              ID=$(echo "$run" | jq -r '.id')
              if [[ "$ID" == "$CURRENT_RUN_ID" ]]; then
                echo "  跳过当前运行 ID: $ID"
                continue
              fi
              echo "  删除本工作流运行记录 ID: $ID"
              gh api -X DELETE "repos/$REPO/actions/runs/$ID" || echo "  删除失败"
            done
          fi

          echo ""
          echo "========================================="
          echo "✅ 全部清理任务完成！"
