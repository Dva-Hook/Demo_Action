name: 清理工作流运行记录

on:
  workflow_dispatch:
    inputs:
      workflow_name:
        description: '输入 ALL 清除所有工作流，或输入工作流名称清除指定工作流'
        required: true
        default: 'ALL'
      count:
        description: '每个工作流最多清理的运行次数'
        required: false
        default: '20'
      delete_failed:
        description: '删除失败的运行记录？'
        required: false
        type: boolean
        default: true
      delete_success:
        description: '删除成功的运行记录？'
        required: false
        type: boolean
        default: false
      delete_cancelled:
        description: '删除已取消的运行记录？'
        required: false
        type: boolean
        default: true
      reverse_order:
        description: '从旧到新开始清理？'
        required: false
        type: boolean
        default: true

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: 安装 GitHub CLI 和 jq
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: 认证 GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: 清理工作流运行记录
        env:
          REPO: ${{ github.repository }}
          COUNT: ${{ inputs.count }}
          DELETE_FAILED: ${{ inputs.delete_failed }}
          DELETE_SUCCESS: ${{ inputs.delete_success }}
          DELETE_CANCELLED: ${{ inputs.delete_cancelled }}
          REVERSE_ORDER: ${{ inputs.reverse_order }}
          WORKFLOW_NAME: ${{ inputs.workflow_name }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -e

          echo "当前仓库：$REPO"
          echo "输入目标：\"$WORKFLOW_NAME\""

          # 获取全部工作流列表
          ALL_WORKFLOWS=$(gh api repos/$REPO/actions/workflows --paginate | jq -c '[.workflows[] | {id, name}] | unique_by(.id)')
          echo "仓库内共有 $(echo "$ALL_WORKFLOWS" | jq 'length') 个工作流"

          # 解析要清理的目标
          if [[ "${WORKFLOW_NAME^^}" == "ALL" ]]; then
            echo "模式：清理所有工作流"
            TARGET_WORKFLOWS="$ALL_WORKFLOWS"
          else
            echo "模式：清理指定工作流 \"$WORKFLOW_NAME\""
            TARGET_WORKFLOWS=$(echo "$ALL_WORKFLOWS" | jq -c --arg name "$WORKFLOW_NAME" '[.[] | select(.name == $name)]')
            if [[ "$(echo "$TARGET_WORKFLOWS" | jq 'length')" -eq 0 ]]; then
              echo "未找到工作流 \"$WORKFLOW_NAME\"。"
              echo "可用工作流列表："
              echo "$ALL_WORKFLOWS" | jq -r '.[].name' | sed 's/^/  - /'
              exit 1
            fi
          fi

          cleanup_workflow() {
            local WF_ID="$1"
            local WF_NAME="$2"

            echo ""
            echo "========== 清理工作流: $WF_NAME (ID: $WF_ID) =========="

            PER_PAGE=100
            PAGE=1
            MATCHED_RUNS="[]"
            while true; do
              RESP=$(gh api "repos/$REPO/actions/workflows/$WF_ID/runs?per_page=$PER_PAGE&page=$PAGE")
              RUNS=$(echo "$RESP" | jq '.workflow_runs')
              COUNT_THIS_PAGE=$(echo "$RUNS" | jq 'length')

              if [ "$COUNT_THIS_PAGE" -eq 0 ]; then
                break
              fi

              MATCHED_RUNS=$(jq -s 'add' <(echo "$MATCHED_RUNS") <(echo "$RUNS"))
              PAGE=$((PAGE + 1))
            done

            TOTAL=$(echo "$MATCHED_RUNS" | jq 'length')
            echo "共获取到 $TOTAL 条运行记录。"

            if [ "$TOTAL" -eq 0 ]; then
              echo "无需清理。"
              return 0
            fi

            if [[ "$REVERSE_ORDER" == "true" ]]; then
              SORTED_RUNS=$(echo "$MATCHED_RUNS" | jq 'sort_by(.run_started_at)')
            else
              SORTED_RUNS=$(echo "$MATCHED_RUNS" | jq 'sort_by(.run_started_at) | reverse')
            fi

            TO_DELETE_RUNS=$(echo "$SORTED_RUNS" | jq ".[0:${COUNT}]")

            echo "$TO_DELETE_RUNS" | jq -c '.[]' | while IFS= read -r run; do
              ID=$(echo "$run" | jq -r '.id')
              STATUS=$(echo "$run" | jq -r '.conclusion')
              STATE=$(echo "$run" | jq -r '.status')

              # 跳过当前正在执行的本次清理任务
              if [[ "$ID" == "$CURRENT_RUN_ID" ]]; then
                echo "跳过当前运行 ID: $ID"
                continue
              fi

              if [[ "$STATE" == "in_progress" || "$STATE" == "queued" ]]; then
                echo "跳过运行 ID: $ID（状态为 $STATE）"
                continue
              fi

              if [[ "$STATUS" == "failure" && "$DELETE_FAILED" != "true" ]]; then continue; fi
              if [[ "$STATUS" == "success" && "$DELETE_SUCCESS" != "true" ]]; then continue; fi
              if [[ "$STATUS" == "cancelled" && "$DELETE_CANCELLED" != "true" ]]; then continue; fi

              echo "删除运行记录 ID: $ID (状态: $STATUS)"
              gh api -X DELETE "repos/$REPO/actions/runs/$ID" || echo "删除失败: $ID"
            done
          }

          # 逐个清理目标工作流
          echo "$TARGET_WORKFLOWS" | jq -c '.[]' | while IFS= read -r wf; do
            WF_ID=$(echo "$wf" | jq -r '.id')
            WF_NAME=$(echo "$wf" | jq -r '.name')
            cleanup_workflow "$WF_ID" "$WF_NAME"
          done

          # 如果不是 ALL 模式，额外清理本工作流的历史记录（不含当前 run）
          if [[ "${WORKFLOW_NAME^^}" != "ALL" ]]; then
            echo ""
            echo "========== 清理本工作流历史记录 =========="
            SELF_WF=$(echo "$ALL_WORKFLOWS" | jq -c '.[] | select(.name == "清理工作流运行记录")')
            if [ -n "$SELF_WF" ]; then
              SELF_ID=$(echo "$SELF_WF" | jq -r '.id')
              SELF_NAME=$(echo "$SELF_WF" | jq -r '.name')
              # 避免重复清理：如果目标已经是本工作流就跳过
              if [[ "$WORKFLOW_NAME" != "$SELF_NAME" ]]; then
                cleanup_workflow "$SELF_ID" "$SELF_NAME"
              fi
            fi
          fi

          echo ""
          echo "全部清理完成。"
