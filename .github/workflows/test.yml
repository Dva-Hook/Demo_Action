name: 战网自动注册

on:
  workflow_dispatch:
    inputs:
      capmonster_key:
        description: "CapMonster Cloud API Key"
        required: true
        default: "8ddb7082169465f50bd87cd551262adb"
      count:
        description: "并行注册数量 (1-256)"
        required: false
        default: "256"
      proxies:
        description: "HTTP代理列表，每行一个。格式: host:port:user:pass (带认证) 或 host:port (无认证)，支持 # 注释行"
        required: false
        default: "socks5://res.lzproxy.com:10000:bdb53a2946c5d9f7:mSCfyIoG79YAvZxt"
      proxy_strategy:
        description: "代理分配策略 — random: 每个job随机选 sequential: 按job编号轮询"
        required: false
        default: "random"
        type: choice
        options:
          - random
          - sequential

permissions:
  actions: write
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      indices: ${{ steps.gen.outputs.indices }}
      proxies_json: ${{ steps.gen.outputs.proxies_json }}
      proxy_strategy: ${{ steps.gen.outputs.proxy_strategy }}
    steps:
      - name: 动态生成矩阵
        id: gen
        run: |
          N=${{ github.event.inputs.count }}
          N=${N:-1}
          if [ "$N" -gt 256 ]; then N=256; fi
          indices=$(python3 -ESs -c 'import json,sys; n=int(sys.argv[1]); print(json.dumps(list(range(1, n+1))))' "$N")
          echo "indices=$indices" >> $GITHUB_OUTPUT
          echo "矩阵大小: $N"

          # 解析代理列表为 JSON 数组 (过滤空行和注释行)
          PROXIES_RAW='${{ github.event.inputs.proxies }}'
          PROXIES_JSON=$(echo "$PROXIES_RAW" | python3 -ESs -c '
          import json, sys
          lines = [l.strip() for l in sys.stdin.read().splitlines()
                   if l.strip() and not l.strip().startswith("#")]
          print(json.dumps(lines))
          ')
          echo "proxies_json=$PROXIES_JSON" >> $GITHUB_OUTPUT
          echo "proxy_strategy=${{ github.event.inputs.proxy_strategy }}" >> $GITHUB_OUTPUT
          echo "代理数量: $(echo $PROXIES_JSON | python3 -ESs -c 'import json,sys; print(len(json.load(sys.stdin)))')"

  register:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        index: ${{ fromJson(needs.prepare.outputs.indices) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: 安装 Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Cache pip 包
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-v2

      - name: 安装 Python 依赖
        run: pip install selenium webdriver-manager websocket-client requests pproxy

      - name: 执行注册
        env:
          CAPMONSTER_API_KEY: ${{ github.event.inputs.capmonster_key }}
          PROXIES_JSON: ${{ needs.prepare.outputs.proxies_json }}
          PROXY_STRATEGY: ${{ needs.prepare.outputs.proxy_strategy }}
          PYTHONUNBUFFERED: "1"
          MATRIX_INDEX: "${{ matrix.index }}"
        run: python register.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reg-data-${{ matrix.index }}
          path: |
            success.png
            error_*.png
          if-no-files-found: ignore

      - name: 上传账号数据
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reg-accounts-${{ matrix.index }}
          path: registered_account.txt
          if-no-files-found: ignore

  collect:
    needs: register
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有截图
        uses: actions/download-artifact@v4
        with:
          pattern: reg-data-*
          path: all_screenshots
          merge-multiple: false

      - name: 下载所有账号
        uses: actions/download-artifact@v4
        with:
          pattern: reg-accounts-*
          path: all_accounts
          merge-multiple: false

      - name: 合并账号文件
        run: |
          > all_accounts.txt
          for f in all_accounts/*/registered_account.txt; do
            [ -f "$f" ] && cat "$f" >> all_accounts.txt && echo "" >> all_accounts.txt
          done
          [ -s all_accounts.txt ] || echo "(无成功注册)" > all_accounts.txt

      - name: 打包截图
        run: |
          mkdir -p flat_screenshots
          find all_screenshots -name "*.png" -exec cp {} flat_screenshots/ \;
          echo "截图数量: $(find flat_screenshots -name '*.png' | wc -l)"

      - name: 上传汇总截图
        uses: actions/upload-artifact@v4
        with:
          name: all-screenshots
          path: flat_screenshots/
          if-no-files-found: ignore

      - name: 上传汇总账号
        uses: actions/upload-artifact@v4
        with:
          name: all-registered-accounts
          path: all_accounts.txt
          if-no-files-found: ignore
