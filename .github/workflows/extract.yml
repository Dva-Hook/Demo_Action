name: OTA Partition Extractor

on:
  workflow_dispatch:
    inputs:
      device:
        description: '设备型号'
        required: true
        type: choice
        options:
          - OP 10 PRO
          - OP 11
          - OP 11R
          - OP 12
          - OP 12R
          - OP 13
          - OP 13R
          - OP 13S
          - OP 13T
          - OP 15
          - OP 15R
          - OP 15T
          - OP ACE 3
          - OP ACE 3 PRO
          - OP ACE 3V
          - OP ACE 5
          - OP ACE 5 PRO
          - OP ACE 5 ULTRA
          - OP ACE 5 RACING
          - OP ACE 6
          - OP ACE 6T
          - OP TURBO 6
          - OP TURBO 6V
          - OP NORD 4
          - OP NORD CE4
          - OP NORD 5
          - OP NORD CE5
          - OP PAD
          - OP PAD LITE
          - OP PAD2
          - OP PAD2 PRO
          - OP PAD3
          - OP PAD GO 2
          - OP OPEN
          - OPPO FIND N5
          - OPPO FIND X8
          - OPPO FIND X8 PRO
          - OPPO FIND X8 ULTRA
          - OPPO FIND X9
          - OPPO FIND X9 PRO
          - OPPO RENO 15 PRO
          - Realme GT5 PRO
          - Realme GT7 PRO
          - Realme GT8 PRO
        default: 'OP 13'
      region:
        description: '地区版本'
        required: true
        type: choice
        options:
          - GLO
          - EU
          - IN
          - CN
          - NA
        default: 'CN'
      version_index:
        description: '版本号索引 (0=最新, 1=次新, 以此类推)'
        required: true
        type: number
        default: 0
      partitions:
        description: '要提取的分区 (逗号分隔，如 boot,dtbo,vendor_boot，留空提取全部)'
        required: false
        type: string
        default: 'boot,init_boot,vbmeta,vbmeta_system'
      workers:
        description: '并行工作线程数'
        required: false
        type: number
        default: 4

jobs:
  extract:
    name: Extract Partitions
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install httpx beautifulsoup4
      
      - name: Get OTA Download URL
        id: get_ota
        run: |
          python3 << 'PYEOF'
          import httpx
          import json
          import os
          import re
          from bs4 import BeautifulSoup
          
          device = "${{ inputs.device }}"
          region = "${{ inputs.region }}"
          version_index = ${{ inputs.version_index }}
          
          url = "https://roms.danielspringer.at/index.php?view=ota"
          resp = httpx.get(url, follow_redirects=True)
          resp.raise_for_status()
          
          soup = BeautifulSoup(resp.text, 'html.parser')
          select = soup.find('select', id='device')
          devices = json.loads(select['data-devices'])
          
          if device not in devices:
              raise Exception(f"Device '{device}' not found")
          
          device_regions = devices[device]
          if region not in device_regions:
              raise Exception(f"Region '{region}' not available for '{device}'")
          
          versions = device_regions[region]
          if not versions:
              raise Exception(f"No versions for '{device}' in '{region}'")
          
          if version_index >= len(versions):
              raise Exception(f"Version index {version_index} out of range (0-{len(versions)-1})")
          
          version = versions[version_index]
          print(f"Selected: {device} | {region} | {version}")
          
          # POST to get download page
          post_data = {
              "device": device,
              "region": region,
              "version_index": str(version_index)
          }
          
          post_resp = httpx.post(url, data=post_data, follow_redirects=True)
          post_resp.raise_for_status()
          
          post_soup = BeautifulSoup(post_resp.text, 'html.parser')
          
          # Find download link - BeautifulSoup auto-decodes HTML entities
          download_url = None
          for a in post_soup.find_all('a', href=True):
              href = a['href']  # Already decoded (&amp; → &)
              if any(kw in href.lower() for kw in ['download', 'ota', 'firmware', 'update', '.zip']):
                  if href.startswith('http'):
                      download_url = href
                      break
          
          if not download_url:
              # Try all links
              for a in post_soup.find_all('a', href=True):
                  href = a['href']
                  if href.startswith('http'):
                      download_url = href
                      break
          
          if not download_url:
              with open('response_debug.html', 'w') as f:
                  f.write(post_resp.text)
              raise Exception("Could not find download URL. Check response_debug.html")
          
          print(f"Download URL: {download_url}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'ota_url={download_url}\n')
              f.write(f'version={version}\n')
          PYEOF
      
      - name: Show OTA Info
        run: |
          echo "### 📱 设备信息" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **设备**: ${{ inputs.device }}" >> $GITHUB_STEP_SUMMARY
          echo "- **地区**: ${{ inputs.region }}" >> $GITHUB_STEP_SUMMARY
          echo "- **版本**: ${{ steps.get_ota.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **OTA URL**: \`${{ steps.get_ota.outputs.ota_url }}\`" >> $GITHUB_STEP_SUMMARY
      
      - name: Install aria2
        run: sudo apt-get update && sudo apt-get install -y aria2
      
      - name: Download OTA file
        run: |
          echo "⬇️ 正在下载OTA文件..."
          # Use Referer to bypass anti-hotlink protection
          aria2c -s16 -x16 -k1M \
            --referer="https://roms.danielspringer.at/" \
            --header="Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            "${{ steps.get_ota.outputs.ota_url }}" -o ota_update.zip
          echo "✅ 下载完成"
          ls -lh ota_update.zip
      
      - name: Install payload-dumper
        run: pip install git+https://github.com/5ec1cff/payload-dumper
      
      - name: Extract partitions
        run: |
          PARTITIONS_ARG=""
          if [ -n "${{ inputs.partitions }}" ]; then
            PARTITIONS_ARG="--partitions ${{ inputs.partitions }}"
          fi
          
          payload_dumper \
            $PARTITIONS_ARG \
            --workers ${{ inputs.workers }} \
            --out ./output \
            "./ota_update.zip"
      
      - name: Check output
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 提取结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 文件名 | 大小 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          
          for f in output/*.img; do
            if [ -f "$f" ]; then
              SIZE=$(du -h "$f" | cut -f1)
              NAME=$(basename "$f")
              echo "| $NAME | $SIZE |" >> $GITHUB_STEP_SUMMARY
            fi
          done
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: extracted-${{ inputs.device }}-${{ inputs.region }}-${{ steps.get_ota.outputs.version }}
          path: output/*.img
          retention-days: 7
          if-no-files-found: error