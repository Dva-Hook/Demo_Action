name: OTA Partition Extractor

on:
  workflow_dispatch:
    inputs:
      device:
        description: '设备型号'
        required: true
        type: choice
        options:
          - OP 10 PRO
          - OP 11
          - OP 11R
          - OP 12
          - OP 12R
          - OP 13
          - OP 13R
          - OP 13S
          - OP 13T
          - OP 15
          - OP 15R
          - OP 15T
          - OP ACE 3
          - OP ACE 3 PRO
          - OP ACE 3V
          - OP ACE 5
          - OP ACE 5 PRO
          - OP ACE 5 ULTRA
          - OP ACE 5 RACING
          - OP ACE 6
          - OP ACE 6T
          - OP TURBO 6
          - OP TURBO 6V
          - OP NORD 4
          - OP NORD CE4
          - OP NORD 5
          - OP NORD CE5
          - OP PAD
          - OP PAD LITE
          - OP PAD2
          - OP PAD2 PRO
          - OP PAD3
          - OP PAD GO 2
          - OP OPEN
          - OPPO FIND N5
          - OPPO FIND X8
          - OPPO FIND X8 PRO
          - OPPO FIND X8 ULTRA
          - OPPO FIND X9
          - OPPO FIND X9 PRO
          - OPPO RENO 15 PRO
          - Realme GT5 PRO
          - Realme GT7 PRO
          - Realme GT8 PRO
        default: 'OP 13'
      region:
        description: '地区版本'
        required: true
        type: choice
        options:
          - GLO
          - EU
          - IN
          - CN
          - NA
        default: 'CN'
      version_index:
        description: '版本号索引 (0=最新, 1=次新, 以此类推)'
        required: true
        type: number
        default: 0
      partitions:
        description: '要提取的分区 (逗号分隔，如 boot,dtbo,vendor_boot，留空提取全部)'
        required: false
        type: string
        default: 'boot,init_boot,vbmeta,vbmeta_system'
      workers:
        description: '并行工作线程数'
        required: false
        type: number
        default: 4

jobs:
  extract:
    name: Extract Partitions
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install httpx beautifulsoup4
      
      - name: Get OTA Download URL
        id: get_ota
        run: |
          python3 << 'EOF'
          import httpx
          import json
          import os
          import urllib.parse
          
          device = "${{ inputs.device }}"
          region = "${{ inputs.region }}"
          version_index = ${{ inputs.version_index }}
          
          # Fetch the page to get the devices JSON
          url = "https://roms.danielspringer.at/index.php?view=ota"
          resp = httpx.get(url, follow_redirects=True)
          resp.raise_for_status()
          
          # Parse the devices JSON from the select element
          import re
          match = re.search(r'data-devices=\'(.+?)\'', resp.text)
          if not match:
              # Try with HTML entities
              match = re.search(r'data-devices=&#x27;(.+?)&#x27;', resp.text)
          
          if match:
              devices_json = match.group(1)
              # Decode HTML entities
              devices_json = devices_json.replace('&quot;', '"')
              devices = json.loads(devices_json)
          else:
              raise Exception("Could not find devices data")
          
          # Get versions for selected device and region
          if device not in devices:
              raise Exception(f"Device '{device}' not found. Available: {list(devices.keys())}")
          
          device_regions = devices[device]
          if region not in device_regions:
              raise Exception(f"Region '{region}' not available for '{device}'. Available: {list(device_regions.keys())}")
          
          versions = device_regions[region]
          if not versions:
              raise Exception(f"No versions available for '{device}' in region '{region}'")
          
          if version_index >= len(versions):
              raise Exception(f"Version index {version_index} out of range (0-{len(versions)-1})")
          
          version = versions[version_index]
          print(f"Selected: {device} | {region} | {version}")
          
          # POST to get the download URL
          post_data = {
              "device": device,
              "region": region,
              "version_index": str(version_index)
          }
          
          post_resp = httpx.post(url, data=post_data, follow_redirects=True)
          post_resp.raise_for_status()
          
          # Find the download link in the response
          # Look for href containing download or ota
          download_match = re.search(r'href=[\'"](https?://[^\'"]*(?:download|ota|payload)[^\'"]*)[\'"]', post_resp.text)
          if download_match:
              download_url = download_match.group(1)
              print(f"Download URL: {download_url}")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f'ota_url={download_url}\n')
                  f.write(f'version={version}\n')
          else:
              # Try to find any download button/link
              # Look for anchor tags with download-related text
              all_links = re.findall(r'href=[\'"](https?://[^\'"]+)[\'"]', post_resp.text)
              for link in all_links:
                  if any(kw in link.lower() for kw in ['download', 'ota', 'firmware', 'update']):
                      print(f"Found potential URL: {link}")
                      with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                          f.write(f'ota_url={link}\n')
                          f.write(f'version={version}\n')
                      break
              else:
                  # Save response for debugging
                  with open('response_debug.html', 'w') as f:
                      f.write(post_resp.text)
                  raise Exception("Could not find download URL. Check response_debug.html")
          EOF
      
      - name: Show OTA Info
        run: |
          echo "### 📱 设备信息" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **设备**: ${{ inputs.device }}" >> $GITHUB_STEP_SUMMARY
          echo "- **地区**: ${{ inputs.region }}" >> $GITHUB_STEP_SUMMARY
          echo "- **版本**: ${{ steps.get_ota.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **OTA URL**: \`${{ steps.get_ota.outputs.ota_url }}\`" >> $GITHUB_STEP_SUMMARY
      
      - name: Install payload-dumper
        run: pip install git+https://github.com/5ec1cff/payload-dumper
      
      - name: Extract partitions
        run: |
          PARTITIONS_ARG=""
          if [ -n "${{ inputs.partitions }}" ]; then
            PARTITIONS_ARG="--partitions ${{ inputs.partitions }}"
          fi
          
          payload_dumper \
            $PARTITIONS_ARG \
            --workers ${{ inputs.workers }} \
            --out ./output \
            "${{ steps.get_ota.outputs.ota_url }}"
      
      - name: Check output
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 提取结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 文件名 | 大小 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          
          for f in output/*.img; do
            if [ -f "$f" ]; then
              SIZE=$(du -h "$f" | cut -f1)
              NAME=$(basename "$f")
              echo "| $NAME | $SIZE |" >> $GITHUB_STEP_SUMMARY
            fi
          done
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: extracted-${{ inputs.device }}-${{ inputs.region }}-${{ steps.get_ota.outputs.version }}
          path: output/*.img
          retention-days: 7
          if-no-files-found: error
          retention-days: 7
          if-no-files-found: error
