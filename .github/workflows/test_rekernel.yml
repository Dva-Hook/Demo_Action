name: Test Re-Kernel Download and Upload
permissions:
  contents: read
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernel_major:
        description: "📝 选择内核主版本"
        required: true
        type: choice
        options:
          - '6.1'
          - '6.6'
        default: '6.6'

jobs:
  test_rekernel:
    name: Test Re-Kernel Module
    runs-on: ubuntu-latest
    steps:
      - name: 🔎 Find Re-Kernel module zip (查找Re-Kernel最新模块并下载)
        id: download-rekernel
        uses: actions/github-script@v8
        env:
          KERNEL_MAJOR: ${{ github.event.inputs.kernel_major }}
        with:
          script: |
            const owner = 'Sakion-Team';
            const repo = 'Re-Kernel';
            const kernelMajor = process.env.KERNEL_MAJOR;

            core.info(`正在获取 ${owner}/${repo} 的最新 release...`);

            const release = await github.rest.repos.getLatestRelease({
              owner,
              repo,
            });
            core.info(`最新版本: ${release.data.tag_name}`);
            const escapedKernel = kernelMajor.replace(/\./g, '\\.');
            const pattern = new RegExp(`^Re-Kernel-v[\\d.]+-${escapedKernel}\\.zip$`);

            let targetAsset = null;
            for (const asset of release.data.assets || []) {
              if (pattern.test(asset.name)) {
                targetAsset = asset;
                break;
              }
            }

            if (!targetAsset) {
              core.setFailed(`未找到匹配的 Re-Kernel 模块资产 (模式: ${pattern.source})`);
              return;
            }

            core.info(`找到目标资产: ${targetAsset.name} (${(targetAsset.size / 1024).toFixed(1)} KB)`);
            core.setOutput('asset-name', targetAsset.name);
            core.setOutput('download-url', targetAsset.browser_download_url);
            
            // 从asset name中提取版本号，例如: Re-Kernel-v8.6-6.6.zip -> 8.6
            const versionMatch = targetAsset.name.match(/^Re-Kernel-v([\d.]+)-/);
            const version = versionMatch ? versionMatch[1] : release.data.tag_name;
            core.setOutput('version', version);
            core.setOutput('tag-name', release.data.tag_name);

      - name: 📥 Download Re-Kernel module (下载 Re-Kernel 模块)
        env:
          ASSET_NAME: ${{ steps.download-rekernel.outputs.asset-name }}
          DOWNLOAD_URL: ${{ steps.download-rekernel.outputs.download-url }}
          VERSION: ${{ steps.download-rekernel.outputs.version }}
          ARTIFACT_NAME: Re-Kernel-v${{ steps.download-rekernel.outputs.version }}-${{ github.event.inputs.kernel_major }}
        run: |
          set -euo pipefail
          echo "=========================================="
          echo "Re-Kernel 模块信息:"
          echo "  Asset名称: $ASSET_NAME"
          echo "  版本号: $VERSION"
          echo "  Artifact名称: $ARTIFACT_NAME"
          echo "  下载地址: $DOWNLOAD_URL"
          echo "=========================================="
          
          echo "正在下载 Re-Kernel 模块..."
          aria2c -s16 -x16 -k1M "$DOWNLOAD_URL" -o "$ASSET_NAME"
          echo "✓ Re-Kernel 模块下载完成"
          ls -lh "$ASSET_NAME"
          
          echo "正在创建目录 $ARTIFACT_NAME 并解压模块..."
          mkdir -p "$ARTIFACT_NAME"
          unzip -q "$ASSET_NAME" -d "$ARTIFACT_NAME"
          echo "✓ 目录结构:"
          ls -lR "$ARTIFACT_NAME"

      - name: 📤 Upload Re-Kernel module (上传 Re-Kernel 模块)
        uses: actions/upload-artifact@v5
        with:
          name: Re-Kernel-v${{ steps.download-rekernel.outputs.version }}-${{ github.event.inputs.kernel_major }}
          path: Re-Kernel-v${{ steps.download-rekernel.outputs.version }}-${{ github.event.inputs.kernel_major }}
      
      - name: ✅ Test Summary (测试总结)
        run: |
          echo "## 🎉 Re-Kernel 测试完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **内核版本**: ${{ github.event.inputs.kernel_major }}" >> $GITHUB_STEP_SUMMARY
          echo "- **模块版本**: ${{ steps.download-rekernel.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Asset名称**: \`${{ steps.download-rekernel.outputs.asset-name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact名称**: \`Re-Kernel-v${{ steps.download-rekernel.outputs.version }}-${{ github.event.inputs.kernel_major }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 搜索、下载、上传流程全部正常！" >> $GITHUB_STEP_SUMMARY
