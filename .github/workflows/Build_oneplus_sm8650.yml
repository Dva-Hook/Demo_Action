name: Build_oneplus_sm8650
permissions:
  contents: read
  actions: write
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: "📝请选择要集成的KSU："
        required: true
        type: choice
        options:
          - 'ReSukiSU'
          - 'SukiSU-Ultra'
        default: 'ReSukiSU'
        
      device_name:
        description: "📝请选择要编译的机型："
        required: true
        type: choice
        options:
          - 'oneplus_12'
          - 'oneplus_ace3_pro'
          - 'oneplus_ace5'
          - 'oneplus_pad2'
          - 'oneplus_pad_pro'
          - 'oneplus_13r'
        default: 'oneplus_12'

      keep_original_settings:
        description: "📝保持原内核名称及构建时间(不懂请保持默认)"
        required: false
        default: true
        type: boolean

      custom_kernel_suffix:
        description: "✏️ 自定义内核名称- 仅在取消勾选'保持原设置'时有效(不懂请保持默认)"
        required: false
        default: ''
      
      custom_kernel_time:
        description: "⏰ 自定义构建时间- 仅在取消勾选'保持原设置'时有效(不懂请保持默认)"
        required: false
        default: ''

      enable_bbg:
        description: "开启BBG基带守护"
        required: false
        default: true
        type: boolean
      

       


jobs:
  build:
    name: Build_${{ github.event.inputs.device_name }}_${{ github.event.inputs.ksu_type }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      KSU_TYPE:               ${{ github.event.inputs.ksu_type }}
      DEVICES_NAME:           ${{ github.event.inputs.device_name }}
      KEEP_ORIGINAL_SETTINGS: ${{ github.event.inputs.keep_original_settings }}
      CUSTOM_KERNEL_SUFFIX:   ${{ github.event.inputs.custom_kernel_suffix }}
      CUSTOM_KERNEL_TIME:     ${{ github.event.inputs.custom_kernel_time }}
      ENABLE_BBG:             ${{ github.event.inputs.enable_bbg }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: ⚙️ Set REPO_MANIFEST (设置对应机型配置文件)
        run: |
          case "${{ env.DEVICES_NAME }}" in
            oneplus_12)
              echo "REPO_MANIFEST=sm8650_b_16.0.0_oneplus12" >> $GITHUB_ENV
              ;;
            oneplus_ace3_pro)
              echo "REPO_MANIFEST=sm8650_b_16.0.0_ace3_pro" >> $GITHUB_ENV
              ;;
            oneplus_ace5)
              echo "REPO_MANIFEST=sm8650_b_16.0.0_ace_5" >> $GITHUB_ENV
              ;;
            oneplus_pad2)
              echo "REPO_MANIFEST=sm8650_b_16.0.0_pad2" >> $GITHUB_ENV
              ;;
            oneplus_pad_pro)
              echo "REPO_MANIFEST=sm8650_b_16.0.0_pad_pro" >> $GITHUB_ENV
              ;;
            oneplus_13r)
              echo "REPO_MANIFEST=sm8650_b_16.0.0_oneplus_13r" >> $GITHUB_ENV
              ;;
          esac
          if [ "${{ env.KEEP_ORIGINAL_SETTINGS }}" = "true" ] && [ -z "${{ github.event.inputs.custom_kernel_suffix }}" ]; then
            echo 'DEFAULT_SUFFIX=-android14-11-o-gca13bffobf09' >> $GITHUB_ENV
            echo "使用原官核名称：${{ env.DEFAULT_SUFFIX }}"
          else
            echo "使用自定义名称: ${{ github.event.inputs.custom_kernel_suffix }}"
            echo "DEFAULT_SUFFIX=${{ github.event.inputs.custom_kernel_suffix }}" >> $GITHUB_ENV
          fi
          if [ "${{ env.KEEP_ORIGINAL_SETTINGS }}" = "true" ] && [ -z "${{ github.event.inputs.custom_kernel_time }}" ]; then
            echo 'KERNEL_TIME=Fri Sep 19 06:13:40 UTC 2025' >> $GITHUB_ENV
            echo "使用官核时间: ${{ env.KERNEL_TIME }}"
          else
            echo "使用自定义构建时间: ${{ github.event.inputs.custom_kernel_time }}"
            echo "KERNEL_TIME=${{ github.event.inputs.custom_kernel_time }}" >> $GITHUB_ENV
          fi

      - name: 🛠 Install dependencies and Initialize repo and sync （安装环境依赖+初始化源码仓库及工具链）
        run: |
          set -euo pipefail
          rm -rf kernel_workspace
          mkdir kernel_workspace
          cd kernel_workspace
          sudo apt-mark hold firefox
          sudo apt-mark hold libc-bin
          sudo apt-get purge -y man-db || true
          sudo rm -rf /var/lib/man-db/auto-update
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends aria2 unzip binutils python-is-python3 libssl-dev libelf-dev ccache
          echo "正在克隆源码仓库..."
          (
            aria2c -s16 -x16 -k1M https://github.com/oneplusoss/android_kernel_common_oneplus_sm8650/archive/refs/heads/oneplus/${REPO_MANIFEST}.zip -o common.zip
            unzip -q common.zip
            mv "android_kernel_common_oneplus_sm8650-oneplus-${REPO_MANIFEST}" common
            rm -f common.zip
          ) &
          
          echo "正在克隆llvm-Clang20工具链..."
          (
            mkdir -p clang20
            aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang20-r547379/clang-r547379.zip -o clang.zip
            unzip -q clang.zip -d clang20
            rm -f clang.zip
          ) &
          
          echo "正在克隆构建工具..."
          (
            aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang20-r547379/build-tools.zip -o build-tools.zip
            unzip -q build-tools.zip
            rm -f build-tools.zip
          ) &
          
          wait
          echo "所有源码及llvm-Clang20工具链初始化完成！"
          echo "正在去除 ABI 保护 & 去除 dirty 后缀..."
          rm -f common/android/abi_gki_protected_exports_* || true
          for f in common/scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
          done
          

      - name: ⚙️ apply Patch (应用test补丁)
        run: |
          echo "正在添加补丁…"
          cd kernel_workspace/common
          cp "${GITHUB_WORKSPACE}/.github/workflows/tools/test1.patch" "./"
            echo "::group::应用 test1.patch"
            if ! git apply -p1 < test1.patch; then
              echo "::error::git apply test1.patch 失败，尝试使用 patch 命令"
              if ! patch -p1 --verbose < test1.patch; then
                echo "::error::patch test1.patch 也失败了"
                echo "=== 检查冲突文件 ==="
                find . -name "*.rej" -o -name "*.orig" | head -20
                exit 1
              fi
            fi
            echo "::endgroup::"
          cp "${GITHUB_WORKSPACE}/.github/workflows/tools/test2.patch" "./"
            echo "::group::应用 test2.patch"
            if ! git apply -p1 < test2.patch; then
              echo "::error::git apply test2.patch 失败，尝试使用 patch 命令"
              if ! patch -p1 --verbose < test2.patch; then
                echo "::error::patch test2.patch 也失败了"
                echo "=== 检查冲突文件 ==="
                find . -name "*.rej" -o -name "*.orig" | head -20
                exit 1
              fi
            fi
            echo "::endgroup::"
          
            # 验证关键文件是否已成功创建
            echo "::group::验证 Patch 应用结果"
            MISSING_FILES=()
            for file in "drivers/soc/oplus/oplus_resctrl/Kconfig" "drivers/soc/oplus/storage/Kconfig"; do
              if [ ! -f "$file" ]; then
                echo "::error::关键文件缺失：$file"
                MISSING_FILES+=("$file")
              fi
            done
            if [ ${#MISSING_FILES[@]} -gt 0 ]; then
              echo "::error::Patch 应用不完整，缺失 ${#MISSING_FILES[@]} 个文件"
              exit 1
            fi
            echo "✓ 所有关键文件已成功创建"
            echo "::endgroup::"

      - name: 🛠 Set ccache DIR(配置ccache目录)
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_${{ env.KSU_TYPE }}_${{ env.DEVICES_NAME }}" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=10G" >> $GITHUB_ENV
          echo "当前磁盘空间："
          df -h
          echo "当前构建内核机型：${{ env.DEVICES_NAME }}"

      - name: 📥 Restore ccache (载入当前机型的ccache缓存)
        id: ccache-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ env.KSU_TYPE }}-${{ env.DEVICES_NAME }}-latest
          restore-keys: |
            ccache-${{ env.KSU_TYPE }}-${{ env.DEVICES_NAME }}-

      - name: 🔎 Find public ccache in releases (查找公共缓存)
        id: public-ccache
        if: ${{ steps.ccache-restore.outputs.cache-matched-key == '' }}
        uses: actions/github-script@v7
        env:
          PUBLIC_CACHE_REPO: ${{ vars.PUBLIC_CACHE_REPO }}
          PUBLIC_CACHE_TAG: ${{ vars.PUBLIC_CACHE_TAG }}
          DEVICE_NAME: ${{ env.DEVICES_NAME }}
        with:
          script: |
            const repoName = process.env.PUBLIC_CACHE_REPO || 'showdo/Build_Oneplus_Realme_Action';
            const releaseTag = process.env.PUBLIC_CACHE_TAG || 'Public_Ccache_SM8750';
            const [owner, repo] = repoName.split('/');
            const deviceName = process.env.DEVICE_NAME;
            let selected = null;

            const escapeRegex = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const exactAssetName = `ccache-${deviceName}.tar.zst`;
            const legacyAssetPattern = new RegExp(`^ccache-(.+-)?${escapeRegex(deviceName)}(-[0-9]+)?\\.tar\\.zst$`);

            core.info(`当前仓库无匹配 ccache，开始按机型查找公共缓存: ${deviceName}`);
            core.info(`缓存来源仓库: ${owner}/${repo}`);
            core.info(`缓存来源标签: ${releaseTag}`);
            core.info(`优先匹配公共缓存文件: ${exactAssetName}`);

            let release;
            try {
              const response = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: releaseTag,
              });
              release = response.data;
            } catch (error) {
              core.info(`未找到公共缓存 release: ${releaseTag}`);
              return;
            }

            for (const asset of release.assets || []) {
              const isExactMatch = asset.name === exactAssetName;
              const isLegacyMatch = legacyAssetPattern.test(asset.name);
              if (isExactMatch || isLegacyMatch) {
                const shouldReplace =
                  !selected ||
                  (isExactMatch && !selected.exact) ||
                  (isExactMatch === selected.exact && new Date(asset.updated_at) > new Date(selected.updated_at));

                if (shouldReplace) {
                  selected = {
                    name: asset.name,
                    updated_at: asset.updated_at,
                    tag: release.tag_name,
                    repo: `${owner}/${repo}`,
                    exact: isExactMatch,
                  };
                }
              }
            }

            if (!selected) {
              core.info('未找到可用的公共 ccache 资产，将使用空缓存继续构建');
              return;
            }

            core.info(`找到公共缓存: ${selected.name} (${selected.repo}@${selected.tag})`);
            core.setOutput('asset-name', selected.name);
            core.setOutput('release-tag', selected.tag);
            core.setOutput('source-repo', selected.repo);

      - name: 📦 Restore public ccache from releases (恢复公共缓存)
        if: ${{ steps.ccache-restore.outputs.cache-matched-key == '' && steps.public-ccache.outputs.asset-name != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLIC_CACHE_REPO: ${{ steps.public-ccache.outputs.source-repo }}
          PUBLIC_CACHE_TAG: ${{ steps.public-ccache.outputs.release-tag }}
          PUBLIC_CACHE_ASSET: ${{ steps.public-ccache.outputs.asset-name }}
        run: |
          set -euo pipefail
          echo "当前仓库无匹配缓存，开始下载公共缓存: $PUBLIC_CACHE_ASSET"
          rm -f "$PUBLIC_CACHE_ASSET"
          rm -rf "$CCACHE_DIR"
          gh release download "$PUBLIC_CACHE_TAG" --repo "$PUBLIC_CACHE_REPO" --pattern "$PUBLIC_CACHE_ASSET" --dir .
          TEMP_EXTRACT_DIR="$(mktemp -d)"
          tar --use-compress-program=unzstd -xf "$PUBLIC_CACHE_ASSET" -C "$TEMP_EXTRACT_DIR"
          EXTRACTED_CCACHE_DIR="$(find "$TEMP_EXTRACT_DIR" -maxdepth 1 -mindepth 1 -type d -name '.ccache_*' | head -n 1)"
          if [ -z "$EXTRACTED_CCACHE_DIR" ]; then
            echo "::error::公共缓存解压后未找到 .ccache_* 目录"
            exit 1
          fi

          mkdir -p "$CCACHE_DIR"
          shopt -s dotglob nullglob
          mv "$EXTRACTED_CCACHE_DIR"/* "$CCACHE_DIR"/
          shopt -u dotglob nullglob
          rm -rf "$TEMP_EXTRACT_DIR"
          test -d "$CCACHE_DIR"
          ls -lah "$CCACHE_DIR" | head -n 20
          echo "PUBLIC_CCACHE_USED=true" >> "$GITHUB_ENV"
          echo "公共缓存恢复完成: $CCACHE_DIR"
      
      - name: 📥 Init ccache (初始化配置ccache)
        run: |
          # 设置ccache环境变量
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="${{ env.CCACHE_MAXSIZE }}"
          
          # 确保ccache目录存在
          mkdir -p "$CCACHE_DIR"
          
          # 每次运行都重新配置缓存大小
          echo "配置ccache缓存大小为: $CCACHE_MAXSIZE"
          ccache -M "$CCACHE_MAXSIZE"
          ccache -o compression=true
          
          # 显示初始缓存状态
          echo "ccache初始状态:"
          ccache -s
          
          # 如果缓存恢复命中，显示详细信息
          if [ -n "${{ steps.ccache-restore.outputs.cache-matched-key }}" ]; then
            echo "ccache缓存命中详情: ${{ steps.ccache-restore.outputs.cache-matched-key }}"
            ccache -sv
          elif [ "${PUBLIC_CCACHE_USED:-false}" = 'true' ]; then
            echo "已恢复公共 ccache，当前缓存详情:"
            ccache -sv
          else
            echo "未命中仓库缓存，也未找到公共缓存，将从空缓存开始构建"
          fi
      
      - name: 🔧 apply lz4 1.10.0 & zstd 1.5.7 patches (添加lz4 1.10.0 & zstd 1.5.7补丁)
        run: |
          echo "正在添加lz4 1.10.0 & zstd 1.5.7补丁…"
          cd kernel_workspace
          git clone https://github.com/cctv18/oppo_oplus_realme_sm8650.git
          cp ./oppo_oplus_realme_sm8650/zram_patch/001-lz4.patch ./common
          cp ./oppo_oplus_realme_sm8650/zram_patch/lz4armv8.S ./common/lib
          cp ./oppo_oplus_realme_sm8650/zram_patch/002-zstd.patch ./common/
          cd ./common
          git apply -p1 < 001-lz4.patch || true
          patch -p1 < 002-zstd.patch || true
          
      - name: 🔧 Set Baseband-guard (开启BBG基带守护)
        if: ${{ env.ENABLE_BBG == 'true' }}
        run: |
          cd kernel_workspace/common
          echo "正在启用BBG基带守护…"
          curl -LSs https://raw.githubusercontent.com/vc-teahouse/Baseband-guard/main/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/lockdown/lockdown,baseband_guard/ } }' ./security/Kconfig

          
      - name: ⚙️ Set ${{ env.KSU_TYPE }} (设置${{ env.KSU_TYPE }})
        run: |
          cd kernel_workspace
          echo "正在配置${{ env.KSU_TYPE }}..."
          if [ "${{ env.KSU_TYPE }}" == 'ReSukiSU' ]; then
            curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main
            cd ./KernelSU 
            KSU_VERSION=$(expr $(git rev-list --count main) + 30700 2>/dev/null || echo 114514)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
          else
            curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s builtin
            cd ./KernelSU
            GIT_COMMIT_HASH=$(git rev-parse --short=8 HEAD)
            echo "当前提交哈希: $GIT_COMMIT_HASH"
            export KSU_VERSION=$KSU_VERSION
            for i in {1..3}; do
              KSU_API_VERSION=$(curl -s "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/builtin/kernel/Kbuild" | 
                grep -m1 "KSU_VERSION_API :=" | 
                awk -F'= ' '{print $2}' | 
                tr -d '[:space:]')
              [ -n "$KSU_API_VERSION" ] && break || sleep 1
            done
            [ -z "$KSU_API_VERSION" ] && KSU_API_VERSION="4.1.0"
            echo "KSU_API_VERSION=$KSU_API_VERSION" >> $GITHUB_ENV
            VERSION_DEFINITIONS=$'define get_ksu_version_full\nv\\$1-'"$GIT_COMMIT_HASH"$'-TG@qdykernel\nendef\n\nKSU_VERSION_API := '"$KSU_API_VERSION"$'\nKSU_VERSION_FULL := v'"$KSU_API_VERSION"$'-'"$GIT_COMMIT_HASH"$'-TG@qdykernel'
            
            sed -i '/define get_ksu_version_full/,/endef/d' kernel/Kbuild
            sed -i '/KSU_VERSION_API :=/d' kernel/Kbuild
            sed -i '/KSU_VERSION_FULL :=/d' kernel/Kbuild
            awk -v def="$VERSION_DEFINITIONS" '
              /REPO_OWNER :=/ {print; print def; inserted=1; next}
              1
              END {if (!inserted) print def}
            ' kernel/Kbuild > kernel/Kbuild.tmp && mv kernel/Kbuild.tmp kernel/Kbuild
            KSU_VERSION=$(expr $(git rev-list --count main) + 37185 2>/dev/null || echo 114514)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
            grep -A10 "REPO_OWNER" kernel/Kbuild
            grep "KSU_VERSION_FULL" kernel/Kbuild
            echo "SukiSU版本号: v${KSU_API_VERSION}-${GIT_COMMIT_HASH}-TG@qdykernel"
          fi

            
      - name: 🔧 Set up SUSFS (配置 SUSFS)
        run: |
          cd kernel_workspace
          git clone --depth=1 https://github.com/cctv18/susfs4oki.git susfs4ksu -b oki-android14-6.1
          wget https://raw.githubusercontent.com/cctv18/oppo_oplus_realme_sm8650/main/other_patch/69_hide_stuff.patch -O ./common/69_hide_stuff.patch
          cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch ./common/
          cp ./susfs4ksu/kernel_patches/fs/* ./common/fs/
          cp ./susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
          cd ./common
          patch -p1 < 50_add_susfs_in_gki-android14-6.1.patch || true
          patch -p1 -N -F 3 < 69_hide_stuff.patch || true
          echo "[OK] SUSFS 补丁处理流程全部完成"



          
      - name: 🔧 Set gki_defconfig (设置编译配置) 
        run: |
          cd kernel_workspace
          echo "CONFIG_KSU=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KPM=y" >> ./common/arch/arm64/configs/gki_defconfig
          
          if [ "${{ env.KSU_TYPE }}" == 'ReSukiSU' ]; then
            echo "CONFIG_KSU_MULTI_MANAGER_SUPPORT=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo 'CONFIG_KSU_FULL_NAME_FORMAT="%TAG_NAME%-%COMMIT_SHA%-Re-TG@qdykernel"' >> ./common/arch/arm64/configs/gki_defconfig
          fi
          
          echo "CONFIG_CRYPTO_LZ4=y" >> ./common/arch/arm64/configs/gki_defconfig

          cd common
          echo "修复 init/Kconfig 中缺失的 oplus_cpu/sched/Kconfig 引用..."
          # 注释掉对不存在的 Kconfig 文件的引用
          sed -i 's|^source "kernel/oplus_cpu/sched/Kconfig"|# source "kernel/oplus_cpu/sched/Kconfig"|' init/Kconfig
          # 验证修复结果
          grep "oplus_cpu/sched" init/Kconfig && echo "已注释问题引用" || echo "未找到问题引用"
          echo "[OK] Kconfig 修复完成"

          cd ..
          echo "CONFIG_CRYPTO_LZ4HC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CRYPTO_LZ4KD=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CRYPTO_ZSTD=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_F2FS_FS_COMPRESSION=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_F2FS_FS_LZ4=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_F2FS_FS_LZ4HC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_F2FS_FS_ZSTD=y" >> ./common/arch/arm64/configs/gki_defconfig
          
          echo "CONFIG_ZSMALLOC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_ZRAM=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_ZRAM_WRITEBACK=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SWAP=y" >> ./common/arch/arm64/configs/gki_defconfig
          
          echo "CONFIG_NET_SCH_FQ_CODEL=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_NET_SCH_FQ=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_F2FS_FS_LZ4HC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_F2FS_FS_ZSTD=y" >> ./common/arch/arm64/configs/gki_defconfig
          
          echo "CONFIG_ZSMALLOC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_ZRAM=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_ZRAM_WRITEBACK=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SWAP=y" >> ./common/arch/arm64/configs/gki_defconfig
          
          echo "CONFIG_NET_SCH_FQ_CODEL=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_NET_SCH_FQ=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_NET_SCH_SFQ=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_NET_SCH_HTB=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_NET_SCH_TBF=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_NET_SCH_SFB=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_NET_SCH_RED=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_NET_SCH_INGRESS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_DEFAULT_FQ_CODEL=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo 'CONFIG_DEFAULT_NET_SCH="fq_codel"' >> ./common/arch/arm64/configs/gki_defconfig
          
          echo "CONFIG_IP_ECN=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_ECN=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IPV6_ECN=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_NF_TARGET_ECN=y" >> ./common/arch/arm64/configs/gki_defconfig
          
          echo "CONFIG_KSU_SUSFS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> ./common/arch/arm64/configs/gki_defconfig
          
          echo "CONFIG_TMPFS_XATTR=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TMPFS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_HEADERS_INSTALL=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> ./common/arch/arm64/configs/gki_defconfig
          
          #Remove check_defconfig
          sudo sed -i 's/check_defconfig//' ./common/build.config.gki

      - name: 🔧 Set Kernel name (设置内核名称)
        run: |
          cd kernel_workspace
          echo "替换内核版本后缀..."
          TARGET_SUFFIX="${CUSTOM_KERNEL_SUFFIX:-$DEFAULT_SUFFIX}"
          if [ -z "$TARGET_SUFFIX" ]; then
            TARGET_SUFFIX="$DEFAULT_SUFFIX"
          fi
          case "$TARGET_SUFFIX" in
            -*) ;;
            *) TARGET_SUFFIX="-$TARGET_SUFFIX" ;;
          esac
          echo "当前内核版本后缀：$TARGET_SUFFIX"
          for f in ./common/scripts/setlocalversion; do
            sed -i 's/${scm_version}//g' "$f"
            sed -i "\$s|echo \"\\\$res\"|echo \"$TARGET_SUFFIX\"|" "$f"
          done
          
      - name: 📥 Start build timer (构建计时开始)
        run: 
          echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV


      - name: 🔨 Build Kernel (构建内核)
        run: |
          set -euo pipefail
          WORKDIR="$(pwd)"
          export PATH="/usr/lib/ccache:$PATH"
          export PATH="$WORKDIR/kernel_workspace/clang20/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          CLANG_DIR="$WORKDIR/kernel_workspace/clang20/bin"
          CLANG_VERSION="$($CLANG_DIR/clang --version | head -n 1)"
          LLD_VERSION="$($CLANG_DIR/ld.lld --version | head -n 1)"
          pahole_version=$(pahole --version 2>/dev/null | head -n1); [ -z "$pahole_version" ] && echo "pahole版本：未安装" || echo "pahole版本：$pahole_version"
          export CCACHE_LOGFILE="${{ github.workspace }}/kernel_workspace/ccache.log"
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="3G"
          echo "sloppiness = file_stat_matches,include_file_ctime,include_file_mtime,pch_defines,file_macro,time_macros" >> "$CCACHE_DIR/ccache.conf"
          cd kernel_workspace/common
          wget https://github.com/cctv18/oppo_oplus_realme_sm8650/raw/refs/heads/main/lib/libfakestat.so
          wget https://github.com/cctv18/oppo_oplus_realme_sm8650/raw/refs/heads/main/lib/libfaketimeMT.so
          chmod 777 ./*.so
          export FAKESTAT="2025-05-25 12:00:00"
          export FAKETIME="@2025-05-25 13:00:00"
          echo "FAKESTAT=$FAKESTAT" >> $GITHUB_ENV
          echo "FAKETIME=$FAKETIME" >> $GITHUB_ENV
          SO_DIR=$(pwd)
          export PRELOAD_LIBS="$SO_DIR/libfakestat.so $SO_DIR/libfaketimeMT.so"
          echo '#!/bin/bash' > cc-wrapper
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> cc-wrapper
          echo 'export FAKESTAT="'$FAKESTAT'"' >> cc-wrapper
          echo 'export FAKETIME="'$FAKETIME'"' >> cc-wrapper
          echo 'ccache clang "$@"' >> cc-wrapper
          echo '#!/bin/bash' > ld-wrapper
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> ld-wrapper
          echo 'export FAKESTAT="'$FAKESTAT'"' >> ld-wrapper
          echo 'export FAKETIME="'$FAKETIME'"' >> ld-wrapper
          echo 'ld.lld "$@"' >> ld-wrapper
          echo '#!/bin/bash' > test-wrapper.sh
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> test-wrapper.sh
          echo 'export FAKESTAT="'$FAKESTAT'"' >> test-wrapper.sh
          echo 'export FAKETIME="'$FAKETIME'"' >> test-wrapper.sh
          echo 'echo ">>> Wrapper 内部环境检查完毕."' >> test-wrapper.sh
          echo 'exec "$@"' >> test-wrapper.sh
          chmod +x test-wrapper.sh
          ./test-wrapper.sh date
          ./test-wrapper.sh stat ./Makefile
          chmod +x cc-wrapper ld-wrapper
          LD_PRELOAD=$PRELOAD_LIBS stat ./Makefile
          export KBUILD_BUILD_TIMESTAMP="${KERNEL_TIME}"
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error gki_defconfig
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="$(pwd)/cc-wrapper" LD="$(pwd)/ld-wrapper" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error Image
          LD_PRELOAD=$PRELOAD_LIBS stat ./Makefile
          echo "内核编译完成！"
          echo "ccache状态："
          ccache -s
      
      - name: 🕒 Calculate build time (计算构建时间)
        run: |
          END=$(date +%s)
          TIME=$((END - BUILD_START))
          echo "BUILD_TIME=$TIME" >> $GITHUB_ENV
          echo "Build time: $TIME seconds"

      - name: 📥 Save ccache if needed (构建时间较长或首次落地本地缓存时保存)
        if: ${{ env.BUILD_TIME > 480 || steps.ccache-restore.outputs.cache-matched-key == '' }}
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ env.KSU_TYPE }}-${{ env.DEVICES_NAME }}-${{ github.run_id }}

      - name: 🧹 Clean old ccache (清理旧缓存)
        if: env.BUILD_TIME > 480
        uses: actions/github-script@v7
        env:
          PREFIX: ccache-${{ env.KSU_TYPE }}-${{ env.DEVICES_NAME }}
          CURRENT_KEY: ccache-${{ env.KSU_TYPE }}-${{ env.DEVICES_NAME }}-${{ github.run_id }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const prefix = process.env.PREFIX;
            const currentKey = process.env.CURRENT_KEY;
            let page = 1;
            let deleted = 0;

            core.info('构建时间超过8分钟，已保存ccache缓存');
            core.info(`正在清理旧缓存，匹配前缀: ${prefix}`);

            while (true) {
              const response = await github.rest.actions.getActionsCacheList({
                owner,
                repo,
                per_page: 100,
                page,
              });

              const caches = response.data.actions_caches || [];
              if (caches.length === 0) {
                break;
              }

              for (const cache of caches) {
                if (cache.key.startsWith(prefix) && cache.key !== currentKey) {
                  core.info(`Deleting cache: ${cache.key} (ID: ${cache.id})`);
                  await github.rest.actions.deleteActionsCacheById({
                    owner,
                    repo,
                    cache_id: cache.id,
                  });
                  deleted++;
                }
              }

              if (caches.length < 100) {
                break;
              }
              page++;
            }

            core.info(`旧缓存清理完成，共删除 ${deleted} 个缓存`);

      - name: 📦 Make AnyKernel3 (创建Anykernel3)
        run: |
          git clone https://github.com/showdo/AnyKernel3.git --depth=1      
          rm -rf ./AnyKernel3/.git
          rm -rf ./AnyKernel3/push.sh
          cp kernel_workspace/common/out/arch/arm64/boot/Image ./AnyKernel3/
          7z a -t7z -p'501b10728d2cb08abe16eb8b0bdee33c9d2382e1' -mhe=on "./AnyKernel3/TG频道@qdykernel.7z" ./AnyKernel3/Image
          rm -rf ./AnyKernel3/Image
          
      - name: 📤 Upload AnyKernel3 (上传 Anykernel3)
        uses: actions/upload-artifact@v4
        with:
         name: AK3_${{ env.KSUVER }}_${{ env.DEVICES_NAME }}
         path: ./AnyKernel3/*
