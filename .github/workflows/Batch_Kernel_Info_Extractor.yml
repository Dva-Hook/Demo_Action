name: 批量最新内核信息提取

on:
  workflow_dispatch:
    inputs:
      version_index:
        description: '版本索引 (0=最新，1=次新)'
        required: true
        type: number
        default: 0
      workers:
        description: 'payload-dumper 并行线程数'
        required: false
        type: number
        default: 4

jobs:
  extract-kernel-info:
    name: Extract ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - target: OnePlus 13
            slug: 01-oneplus-13
            site_device: OP 13
            region: CN
            supported: true
          - target: OnePlus 13T
            slug: 02-oneplus-13t
            site_device: OP 13T
            region: CN
            supported: true
          - target: OnePlus Ace 5 Pro
            slug: 03-oneplus-ace5-pro
            site_device: OP ACE 5 PRO
            region: CN
            supported: true
          - target: OnePlus Ace 5 Ultra
            slug: 04-oneplus-ace5-ultra
            site_device: OP ACE 5 ULTRA
            region: CN
            supported: true
          - target: OnePlus Ace 6
            slug: 05-oneplus-ace6
            site_device: OP ACE 6
            region: CN
            supported: true
          - target: OnePlus Pad 2
            slug: 06-oneplus-pad2
            site_device: OP PAD2
            region: IN
            supported: true
          - target: OnePlus Pad 2 Pro
            slug: 07-oneplus-pad2-pro
            site_device: OP PAD2 PRO
            region: CN
            supported: true
          - target: Realme GT7 Pro
            slug: 08-realme-gt7-pro
            site_device: Realme GT7 PRO
            region: CN
            supported: true

    steps:
      - name: 📥 Checkout (检出代码)
        if: matrix.supported == true
        uses: actions/checkout@v4

      - name: 🔧 Set up Python (设置 Python 环境)
        if: matrix.supported == true
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install extraction dependencies (安装提取依赖)
        if: matrix.supported == true
        run: |
          sudo apt-get update
          sudo apt-get install --yes lz4 zstd
          python3 -m pip install httpx beautifulsoup4
          python3 -m pip install git+https://github.com/5ec1cff/payload-dumper

      - name: 🔗 Resolve OTA URL (解析 OTA 下载链接)
        id: get_ota
        if: matrix.supported == true
        continue-on-error: true
        env:
          OTA_DEVICE: ${{ matrix.site_device }}
          OTA_REGION: ${{ matrix.region }}
          OTA_VERSION_INDEX: ${{ inputs.version_index }}
        run: |
          python3 tools/resolve_ota.py \
            --device "$OTA_DEVICE" \
            --region "$OTA_REGION" \
            --version-index "$OTA_VERSION_INDEX" \
            --debug-dir .ota-debug \
            --github-output "$GITHUB_OUTPUT"

      - name: 📤 Upload OTA resolver diagnostics (上传 OTA 解析诊断)
        if: matrix.supported == true && steps.get_ota.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ota-resolver-diagnostics-${{ matrix.slug }}
          path: .ota-debug/
          retention-days: 3
          if-no-files-found: ignore

      - name: 📂 Extract boot partition (提取 boot 分区)
        id: extract
        if: matrix.supported == true && steps.get_ota.outcome == 'success'
        env:
          OTA_URL: ${{ steps.get_ota.outputs.ota_url }}
          WORKERS: ${{ inputs.workers }}
        run: |
          mkdir -p output
          if [ -z "$OTA_URL" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "::warning::Resolved OTA URL is empty"
          elif python3 tools/payload_dumper_compat.py \
              --partitions boot \
              --workers "$WORKERS" \
              --out ./output \
              "$OTA_URL" && [ -f ./output/boot.img ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "boot.img extracted successfully"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "::warning::boot.img extraction failed"
          fi

      - name: 🔍 Extract kernel info (提取内核信息)
        id: kernel_info
        if: matrix.supported == true && steps.extract.outputs.status == 'success'
        continue-on-error: true
        run: |
          python3 tools/extract_kernel_info.py \
            ./output/boot.img \
            --github-output "$GITHUB_OUTPUT"

      - name: 💾 Save target result (保存目标结果)
        id: save_result
        if: always()
        env:
          TARGET: ${{ matrix.target }}
          SLUG: ${{ matrix.slug }}
          SITE_DEVICE: ${{ matrix.site_device }}
          REGION: ${{ matrix.region }}
          RESOLVE_OUTCOME: ${{ steps.get_ota.outcome }}
          EXTRACT_STATUS: ${{ steps.extract.outputs.status }}
          KERNEL_OUTCOME: ${{ steps.kernel_info.outcome }}
          KERNEL_FOUND: ${{ steps.kernel_info.outputs.found }}
          OTA_VERSION: ${{ steps.get_ota.outputs.version }}
          KERNEL_VERSION: ${{ steps.kernel_info.outputs.kernel_version }}
          KERNEL_TIME: ${{ steps.kernel_info.outputs.kernel_time }}
        run: |
          STATUS="SUCCESS"
          if [ "$RESOLVE_OUTCOME" != "success" ]; then
            STATUS="OTA_RESOLUTION_FAILED"
          elif [ "$EXTRACT_STATUS" != "success" ]; then
            STATUS="BOOT_EXTRACTION_FAILED"
          elif [ "$KERNEL_OUTCOME" != "success" ]; then
            STATUS="KERNEL_INFO_FAILED"
          elif [ "$KERNEL_FOUND" != "true" ]; then
            STATUS="KERNEL_INFO_NOT_FOUND"
          fi

          [ -n "$OTA_VERSION" ] || OTA_VERSION="Unknown"
          [ -n "$KERNEL_VERSION" ] || KERNEL_VERSION="Unknown"
          [ -n "$KERNEL_TIME" ] || KERNEL_TIME="Unknown"

          mkdir -p results
          printf '%s|%s|%s|%s|%s|%s|%s\n' \
            "$TARGET" \
            "$SITE_DEVICE" \
            "$REGION" \
            "$OTA_VERSION" \
            "$KERNEL_VERSION" \
            "$KERNEL_TIME" \
            "$STATUS" \
            > results/result.txt
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: 📤 Upload target result (上传目标结果)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-info-${{ matrix.slug }}
          path: results/result.txt
          retention-days: 7
          if-no-files-found: error

  merge-results:
    name: Merge Results (合并结果)
    needs: extract-kernel-info
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download target results (下载目标结果)
        uses: actions/download-artifact@v4
        with:
          pattern: kernel-info-*
          path: ./all-results

      - name: 🔀 Build reports (生成报告)
        run: |
          mkdir -p final-output
          REPORT_MD=./final-output/kernel_info_report.md
          REPORT_TXT=./final-output/kernel_info_report.txt

          {
            echo "# 批量最新内核信息提取报告"
            echo
            echo "- 提取时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- 版本索引: ${{ inputs.version_index }}"
            echo "- 地区: 按目标设备映射"
            echo
            echo "| 目标机型 | OTA 目录设备 | 地区 | OTA 版本 | 内核版本 | 构建时间 | 状态 |"
            echo "|---|---|---|---|---|---|---|"
          } > "$REPORT_MD"

          echo "目标机型|OTA目录设备|地区|OTA版本|内核版本|构建时间|状态" > "$REPORT_TXT"

          while IFS= read -r -d '' file; do
            IFS='|' read -r TARGET SITE_DEVICE REGION OTA_VERSION KERNEL BUILD_TIME STATUS < "$file"
            printf '| %s | %s | %s | `%s` | `%s` | %s | %s |\n' \
              "$TARGET" "$SITE_DEVICE" "$REGION" "$OTA_VERSION" "$KERNEL" "$BUILD_TIME" "$STATUS" \
              >> "$REPORT_MD"
            cat "$file" >> "$REPORT_TXT"
          done < <(find ./all-results -name result.txt -print0 | sort -z)

          {
            echo
            echo "状态说明："
            echo "- \`SUCCESS\`: 已提取最新 OTA 的 boot.img 和内核信息。"
            echo "- 其它状态：对应阶段发生解析、下载或内核识别错误。"
          } >> "$REPORT_MD"

          cat "$REPORT_MD" >> "$GITHUB_STEP_SUMMARY"

      - name: 📤 Upload merged report (上传合并报告)
        uses: actions/upload-artifact@v4
        with:
          name: kernel-info-complete-report
          path: final-output/
          retention-days: 30
          if-no-files-found: error
