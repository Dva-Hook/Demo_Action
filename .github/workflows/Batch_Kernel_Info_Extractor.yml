name: 批量内核信息提取

on:
  workflow_dispatch:
    inputs:
      version_index:
        description: '版本号索引 (0=最新, 1=次新, 以此类推)'
        required: true
        type: number
        default: 0

jobs:
  extract-kernel-info:
    name: Extract Kernel Info
    runs-on: ubuntu-latest
    strategy:
      matrix:
        device:
          - "OP 13"
          - "OP 13T"
          - "OP ACE 6"
          - "OP ACE 5 PRO"
          - "OP ACE 5 ULTRA"
          - "OP PAD2 PRO"
          - "Realme GT7 PRO"
    
    steps:
      - name: 🔧 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 📦 Install dependencies
        run: pip install httpx beautifulsoup4 payload-dumper
      
      - name: 🔗 Get OTA URL & Extract Kernel
        id: extract
        run: |
          python3 << 'PYEOF'
          import httpx
          import json
          import os
          import re
          import struct
          import subprocess
          from bs4 import BeautifulSoup
          
          device = "${{ matrix.device }}"
          region = "CN"
          version_index = ${{ inputs.version_index }}
          
          # Step 1: Get OTA download URL
          url = "https://roms.danielspringer.at/index.php?view=ota"
          resp = httpx.get(url, follow_redirects=True)
          resp.raise_for_status()
          
          soup = BeautifulSoup(resp.text, 'html.parser')
          select = soup.find('select', id='device')
          devices = json.loads(select['data-devices'])
          
          if device not in devices:
              print(f"❌ Device '{device}' not found")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f'result={device}|❌ Device not found|Unknown\n')
              exit(0)
          
          device_regions = devices[device]
          if region not in device_regions:
              print(f"❌ Region '{region}' not available for '{device}'")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f'result={device}|❌ Region not available|Unknown\n')
              exit(0)
          
          versions = device_regions[region]
          if not versions:
              print(f"❌ No versions for '{device}' in '{region}'")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f'result={device}|❌ No versions available|Unknown\n')
              exit(0)
          
          if version_index >= len(versions):
              print(f"❌ Version index {version_index} out of range")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f'result={device}|❌ Version index out of range|Unknown\n')
              exit(0)
          
          version = versions[version_index]
          print(f"📱 Selected: {device} | {region} | {version}")
          
          post_data = {
              "device": device,
              "region": region,
              "version_index": str(version_index)
          }
          
          post_resp = httpx.post(url, data=post_data, follow_redirects=True)
          post_resp.raise_for_status()
          
          post_soup = BeautifulSoup(post_resp.text, 'html.parser')
          
          download_url = None
          for a in post_soup.find_all('a', href=True):
              href = a['href']
              if any(kw in href.lower() for kw in ['download', 'ota', 'firmware', 'update', '.zip']):
                  if href.startswith('http'):
                      download_url = href
                      break
          
          if not download_url:
              for a in post_soup.find_all('a', href=True):
                  href = a['href']
                  if href.startswith('http'):
                      download_url = href
                      break
          
          if not download_url:
              print(f"❌ Could not find download URL for {device}")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f'result={device}|❌ Download URL not found|Unknown\n')
              exit(0)
          
          print(f"🔗 Download URL: {download_url}")
          
          # Step 2: Download and extract boot.img
          os.makedirs('./output', exist_ok=True)
          
          subprocess.run([
              'payload_dumper',
              '--partitions', 'boot',
              '--workers', '4',
              '--out', './output',
              download_url
          ], check=True)
          
          boot_img_path = "./output/boot.img"
          if not os.path.exists(boot_img_path):
              print(f"❌ boot.img not found for {device}")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f'result={device}|❌ boot.img extraction failed|Unknown\n')
              exit(0)
          
          # Step 3: Extract kernel info
          kernel_version = None
          kernel_time = None
          
          def search_version(text):
              global kernel_version, kernel_time
              
              match = re.search(
                  r'Linux version (\S+)\s+\([^)]+\)\s+\([^)]+\)\s+#1\s+SMP\s+PREEMPT\s+(.+)',
                  text
              )
              if match:
                  kernel_version = match.group(1)
                  kernel_time = match.group(2).strip()
                  return True
              
              ver_match = re.search(r'Linux\s+version\s+(\d+\.\d+\.\d+-[^\s]+)', text)
              if not ver_match:
                  ver_match = re.search(r'(\d+\.\d+\.\d+-android\d+-[^\s]+)', text)
              
              if ver_match:
                  kernel_version = ver_match.group(1)
                  time_match = re.search(
                      r'#1\s+SMP\s+PREEMPT\s+((?:Mon|Tue|Wed|Thu|Fri|Sat|Sun)\s+\w+\s+\d+\s+[\d:]+\s+\w+\s+\d{4})',
                      text
                  )
                  if time_match:
                      kernel_time = time_match.group(1)
                  return True
              return False
          
          # Try strings first
          result = subprocess.run(['strings', boot_img_path], capture_output=True, text=True)
          if search_version(result.stdout):
              print("✅ Found via strings scan")
          else:
              # Try decompression
              with open(boot_img_path, 'rb') as f:
                  boot_data = f.read()
              
              kernel_offset = 0
              kernel_size = len(boot_data)
              
              if boot_data[:8] == b'ANDROID!':
                  hdr_ver = struct.unpack('<I', boot_data[16:20])[0]
                  kernel_size = struct.unpack('<I', boot_data[8:12])[0]
                  if hdr_ver <= 2:
                      page_size = struct.unpack('<I', boot_data[36:40])[0]
                      kernel_offset = page_size
                  elif hdr_ver >= 3:
                      kernel_offset = 1580
              
              kernel_data = boot_data[kernel_offset:kernel_offset + kernel_size]
              decompressed = None
              
              # Try gzip
              try:
                  import gzip, io
                  gz_start = kernel_data.find(b'\x1f\x8b')
                  if gz_start >= 0:
                      with gzip.GzipFile(fileobj=io.BytesIO(kernel_data[gz_start:])) as gz:
                          decompressed = gz.read()
                      print("✅ Decompressed with gzip")
              except Exception as e:
                  print(f"gzip failed: {e}")
              
              # Try lz4
              if decompressed is None:
                  try:
                      lz4_start = kernel_data.find(b'\x04\x22\x4d\x18')
                      if lz4_start >= 0:
                          with open('/tmp/kernel.lz4', 'wb') as f:
                              f.write(kernel_data[lz4_start:])
                          result = subprocess.run(
                              ['lz4', '-d', '-f', '/tmp/kernel.lz4', '/tmp/vmlinux'],
                              capture_output=True
                          )
                          if result.returncode == 0:
                              with open('/tmp/vmlinux', 'rb') as f:
                                  decompressed = f.read()
                              print("✅ Decompressed with lz4")
                  except Exception as e:
                      print(f"lz4 failed: {e}")
              
              # Try zstd
              if decompressed is None:
                  try:
                      zstd_start = kernel_data.find(b'\x28\xb5\x2f\xfd')
                      if zstd_start >= 0:
                          with open('/tmp/kernel.zst', 'wb') as f:
                              f.write(kernel_data[zstd_start:])
                          result = subprocess.run(
                              ['zstd', '-d', '-f', '/tmp/kernel.zst', '-o', '/tmp/vmlinux'],
                              capture_output=True
                          )
                          if result.returncode == 0:
                              with open('/tmp/vmlinux', 'rb') as f:
                                  decompressed = f.read()
                              print("✅ Decompressed with zstd")
                  except Exception as e:
                      print(f"zstd failed: {e}")
              
              if decompressed:
                  text = decompressed.decode('utf-8', errors='ignore')
                  if search_version(text):
                      print("✅ Found in decompressed kernel")
                  else:
                      print("❌ Kernel info not found in decompressed data")
              else:
                  print("❌ All decompression methods failed")
          
          # Output result
          if kernel_version:
              result_str = f"{device}|{kernel_version}|{kernel_time or 'Unknown'}"
              print(f"\n✅ {device}: {kernel_version} | {kernel_time or 'Unknown'}")
          else:
              result_str = f"{device}|❌ Extraction failed|Unknown"
              print(f"\n❌ {device}: Could not extract kernel info")
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'result={result_str}\n')
          PYEOF
      
      - name: 💾 Save result to file
        run: |
          RESULT="${{ steps.extract.outputs.result }}"
          DEVICE=$(echo "$RESULT" | cut -d'|' -f1)
          KERNEL=$(echo "$RESULT" | cut -d'|' -f2)
          TIME=$(echo "$RESULT" | cut -d'|' -f3)
          
          mkdir -p ./results
          echo "$DEVICE|$KERNEL|$TIME" > ./results/${{ matrix.device }}.txt
      
      - name: 📤 Upload individual result
        uses: actions/upload-artifact@v4
        with:
          name: kernel-info-${{ matrix.device }}
          path: results/${{ matrix.device }}.txt
          retention-days: 7

  merge-results:
    name: Merge Results
    needs: extract-kernel-info
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-results
      
      - name: 🔀 Merge results into single file
        run: |
          mkdir -p ./final-output
          
          echo "=========================================" > ./final-output/kernel_info_report.txt
          echo "     批量内核信息提取报告" >> ./final-output/kernel_info_report.txt
          echo "=========================================" >> ./final-output/kernel_info_report.txt
          echo "" >> ./final-output/kernel_info_report.txt
          echo "提取时间: $(date '+%Y-%m-%d %H:%M:%S')" >> ./final-output/kernel_info_report.txt
          echo "地区版本: CN" >> ./final-output/kernel_info_report.txt
          echo "版本索引: ${{ inputs.version_index }}" >> ./final-output/kernel_info_report.txt
          echo "" >> ./final-output/kernel_info_report.txt
          echo "-----------------------------------------" >> ./final-output/kernel_info_report.txt
          printf "%-25s | %-35s | %s\n" "设备型号" "内核版本" "构建时间" >> ./final-output/kernel_info_report.txt
          echo "-----------------------------------------" >> ./final-output/kernel_info_report.txt
          
          SUMMARY_MD="### 📊 批量内核信息提取报告"
          SUMMARY_MD+=$'\n\n'
          SUMMARY_MD+="**地区版本**: CN  "
          SUMMARY_MD+=$'\n'
          SUMMARY_MD+="**版本索引**: ${{ inputs.version_index }}  "
          SUMMARY_MD+=$'\n'
          SUMMARY_MD+="**提取时间**: $(date '+%Y-%m-%d %H:%M:%S')"
          SUMMARY_MD+=$'\n\n'
          SUMMARY_MD+="| 设备型号 | 内核版本 | 构建时间 |"
          SUMMARY_MD+=$'\n'
          SUMMARY_MD+="|----------|----------|----------|"
          
          for file in ./all-results/kernel-info-*/${{ matrix.device }}.txt; do
            if [ -f "$file" ]; then
              LINE=$(cat "$file")
              DEVICE=$(echo "$LINE" | cut -d'|' -f1)
              KERNEL=$(echo "$LINE" | cut -d'|' -f2)
              TIME=$(echo "$LINE" | cut -d'|' -f3)
              
              printf "%-25s | %-35s | %s\n" "$DEVICE" "$KERNEL" "$TIME" >> ./final-output/kernel_info_report.txt
              
              SUMMARY_MD+="| $DEVICE | \`$KERNEL\` | $TIME |"$'\n'
            fi
          done
          
          echo "" >> ./final-output/kernel_info_report.txt
          echo "=========================================" >> ./final-output/kernel_info_report.txt
          
          echo "$SUMMARY_MD" >> $GITHUB_STEP_SUMMARY
      
      - name: 📤 Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: kernel-info-complete-report
          path: final-output/kernel_info_report.txt
          retention-days: 30
