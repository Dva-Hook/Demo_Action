name: Build_oneplus_sm8750

permissions:
  contents: read
  actions: write

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: "📝请选择要集成的KSU"
        required: true
        type: choice
        options:
          - 'ReSukiSU'
          - 'SukiSU-Ultra'
        default: 'ReSukiSU'

      device_name:
        description: "📝请选择要编译的机型"
        required: true
        type: choice
        options:
          - 'oneplus_13'
          - 'oneplus_ace5_pro'
          - 'oneplus_ace_6'
          - 'oneplus_13t'
          - 'oneplus_pad_2_pro'
          - 'oneplus_ace5_ultra'
          - 'realme_GT7'
          - 'realme_GT7pro'
          - 'realme_GT7pro_Speed'
          - 'realme_GT8'
        default: 'oneplus_ace5_pro'

      custom_kernel_suffix:
        description: "✏️ 自定义内核名称- (-开头 留空则默认官方）"
        required: false
        default: ''

      custom_kernel_time:
        description: "⏰ 自定义构建时间- (英文时间字符串格式 留空则默认官方）"
        required: false
        default: ''

      enable_ReKernel:
        description: "启用Re-Kernel支持"
        required: true
        default: false
        type: boolean

      enable_Adios:
        description: "启用ADIOS IO调度器支持"
        required: true
        default: true
        type: boolean

      enable_scx:
        description: "添加完美风驰"
        required: true
        default: true
        type: boolean

      enable_bbg:
        description: "开启BBG基带守护"
        required: true
        default: true
        type: boolean

      enable_serialid_check:
        description: "开启SerialID校验"
        required: true
        default: true
        type: boolean

      enable_susfs:
        description: "启用SUSFS"
        required: true
        default: true
        type: boolean

jobs:
  build:
    name: Build_${{ github.event.inputs.device_name }}_${{ github.event.inputs.ksu_type }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      KSU_TYPE:               ${{ github.event.inputs.ksu_type }}
      DEVICES_NAME:           ${{ github.event.inputs.device_name }}
      CUSTOM_KERNEL_SUFFIX:   ${{ github.event.inputs.custom_kernel_suffix }}
      CUSTOM_KERNEL_TIME:     ${{ github.event.inputs.custom_kernel_time }}
      ENABLE_REKERNEL:        ${{ github.event.inputs.enable_ReKernel }}
      ENABLE_ADIOS:           ${{ github.event.inputs.enable_Adios }}
      ENABLE_SCX:             ${{ github.event.inputs.enable_scx }}
      ENABLE_BBG:             ${{ github.event.inputs.enable_bbg }}
      ENABLE_SERIALID_CHECK:  ${{ github.event.inputs.enable_serialid_check }}
      ENABLE_SUSFS:           ${{ github.event.inputs.enable_susfs }}

      DEPS_CACHE_VERSION: v4
      CLANG18_VERSION: clang-r510928
      BUILD_TOOLS_VERSION: build-tools-r510928
      SUSFS_BRANCH: oki-android15-6.6
      SCHED_PATCH_SM8750_BRANCH: sm8750
      SCHED_PATCH_MT6991_BRANCH: mt6991
      ANYKERNEL3_REPO: showdo/AnyKernel3

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: ⚙️ Set REPO_MANIFEST (设置对应机型配置文件)
        run: |
          case "${DEVICES_NAME}" in
            oneplus_ace5_pro)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_oneplus_ace5_pro" >> "$GITHUB_ENV"
              echo "IMAGENAME=Image_Op_Ace_5_Pro" >> "$GITHUB_ENV"
              echo "SCHED_FILE=oneplus_ace5_pro_b" >> "$GITHUB_ENV"
              ;;
            oneplus_13)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_oneplus_13" >> "$GITHUB_ENV"
              echo "IMAGENAME=Image_Op_13" >> "$GITHUB_ENV"
              echo "SCHED_FILE=oneplus_13_b" >> "$GITHUB_ENV"
              ;;
            oneplus_ace_6)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_ace_6" >> "$GITHUB_ENV"
              echo "IMAGENAME=Image_Op_Ace_6" >> "$GITHUB_ENV"
              echo "SCHED_FILE=oneplus_ace_6" >> "$GITHUB_ENV"
              ;;
            oneplus_13t)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_oneplus_13t" >> "$GITHUB_ENV"
              echo "IMAGENAME=Image_Op_13_T" >> "$GITHUB_ENV"
              echo "SCHED_FILE=oneplus_13t_b" >> "$GITHUB_ENV"
              ;;
            oneplus_pad_2_pro)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_pad_2_pro" >> "$GITHUB_ENV"
              echo "IMAGENAME=Image_Op_Pad_2_Pro_New" >> "$GITHUB_ENV"
              echo "SCHED_FILE=oneplus_pad_2_pro_b" >> "$GITHUB_ENV"
              ;;
            oneplus_ace5_ultra)
              echo "REPO_MANIFEST=mt6991_b_16.0.0_oneplus_ace5_ultra" >> "$GITHUB_ENV"
              echo "IMAGENAME=Image_Op_Ace_5_Ultra" >> "$GITHUB_ENV"
              echo "SCHED_FILE=oneplus_ace5_ultra_b" >> "$GITHUB_ENV"
              ;;
            realme_GT7)
              echo "REPO_MANIFEST=mt6991_b_16.0.0_oneplus_ace5_ultra" >> "$GITHUB_ENV"
              echo "IMAGENAME=Image_Rm_GT_7" >> "$GITHUB_ENV"
              echo "SCHED_FILE=oneplus_ace5_ultra_b" >> "$GITHUB_ENV"
              ;;
            realme_GT7pro)
              echo "IMAGENAME=Image_Rm_GT_7_Pro" >> "$GITHUB_ENV"
              echo "SCHED_FILE=oneplus_ace_6" >> "$GITHUB_ENV"
              ;;
            realme_GT7pro_Speed)
              echo "IMAGENAME=Image_Rm_GT_7_Pro_Speed" >> "$GITHUB_ENV"
              echo "SCHED_FILE=oneplus_ace_6" >> "$GITHUB_ENV"
              ;;
            realme_GT8)
              echo "IMAGENAME=Image_Rm_GT_8" >> "$GITHUB_ENV"
              echo "SCHED_FILE=oneplus_ace_6" >> "$GITHUB_ENV"
              ;;
          esac

          if [ -z "${CUSTOM_KERNEL_SUFFIX}" ]; then
            case "${DEVICES_NAME}" in
              oneplus_pad_2_pro)
                DEFAULT_SUFFIX='-android15-8-g096cdb6ecefc-ab14358676-4k'
                ;;
              oneplus_ace5_ultra)
                DEFAULT_SUFFIX='-android15-8-ge6068c2aa11d-abogki454747580-4k'
                ;;
              oneplus_13 | oneplus_13t | oneplus_ace5_pro | oneplus_ace_6 | realme_GT7 | realme_GT7pro_Speed | realme_GT8)
                DEFAULT_SUFFIX='-android15-8-g7e1f3c083cc6-abogki467167594-4k'
                ;;
              realme_GT7pro)
                DEFAULT_SUFFIX='-android15-8-gf4dc45704e54-abogki446052083-4k'
                ;;
            esac
            echo "DEFAULT_SUFFIX=$DEFAULT_SUFFIX" >> "$GITHUB_ENV"
            echo "使用原官核名称：$DEFAULT_SUFFIX"
          else
            if [[ "${CUSTOM_KERNEL_SUFFIX}" != -* ]]; then
              echo "::warning::自定义内核名称请以 - 开头"
              echo "示例：-android15-8-g096cdb6ecefc-ab14358676-4k"
            fi
            echo "使用自定义名称: ${CUSTOM_KERNEL_SUFFIX}"
            echo "DEFAULT_SUFFIX=${CUSTOM_KERNEL_SUFFIX}" >> "$GITHUB_ENV"
          fi

          if [ -z "${CUSTOM_KERNEL_TIME}" ]; then
            case "${DEVICES_NAME}" in
              oneplus_pad_2_pro)
                KERNEL_TIME='Tue Oct 28 09:04:21 UTC 2025'
                ;;
              oneplus_ace5_ultra)
                KERNEL_TIME='Tue Jul  1 19:48:18 UTC 2025'
                ;;
              oneplus_13 | oneplus_13t | oneplus_ace5_pro | oneplus_ace_6 | realme_GT7 | realme_GT7pro_Speed | realme_GT8)
                KERNEL_TIME='Mon Dec  8 04:00:43 UTC 2025'
                ;;
              realme_GT7pro)
                KERNEL_TIME='Fri Sep 19 06:13:40 UTC 2025'
                ;;
            esac
            echo "KERNEL_TIME=$KERNEL_TIME" >> "$GITHUB_ENV"
            echo "使用官核时间：$KERNEL_TIME"
          else
            echo "使用自定义构建时间: ${CUSTOM_KERNEL_TIME}"
            echo "KERNEL_TIME=${CUSTOM_KERNEL_TIME}" >> "$GITHUB_ENV"
          fi

      - name: 📥 Restore dependency caches (恢复依赖缓存)
        id: deps-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cache/build_oneplus/apt-archives/*.deb
            ~/.cache/build_oneplus/toolchains/clang18
            ~/.cache/build_oneplus/toolchains/build-tools
            ~/.cache/build_oneplus/repos/oppo_oplus_realme_sm8750
            ~/.cache/build_oneplus/repos/susfs4oki
            ~/.cache/build_oneplus/repos/SCHED_PATCH_sm8750
            ~/.cache/build_oneplus/repos/SCHED_PATCH_MT6991
            ~/.cache/build_oneplus/repos/AnyKernel3
            ~/.cache/build_oneplus/repos/Baseband-guard
            ~/.cache/build_oneplus/files/libfakestat.so
            ~/.cache/build_oneplus/files/libfaketimeMT.so
          key: deps-${{ runner.os }}-${{ env.DEPS_CACHE_VERSION }}-${{ env.CLANG18_VERSION }}-${{ env.BUILD_TOOLS_VERSION }}-${{ env.SUSFS_BRANCH }}

      - name: 🛠 Install dependencies and Initialize repo and sync （安装环境依赖+初始化源码仓库及工具链）
        run: |
          set -euo pipefail

          CACHE_ROOT="$HOME/.cache/build_oneplus"
          APT_CACHE_DIR="$CACHE_ROOT/apt-archives"
          TOOLCHAIN_CACHE_DIR="$CACHE_ROOT/toolchains"
          REPO_CACHE_DIR="$CACHE_ROOT/repos"
          FILE_CACHE_DIR="$CACHE_ROOT/files"

          mkdir -p "$APT_CACHE_DIR/partial" \
                   "$TOOLCHAIN_CACHE_DIR" \
                   "$REPO_CACHE_DIR" \
                   "$FILE_CACHE_DIR"

          rm -rf kernel_workspace
          mkdir -p kernel_workspace
          cd kernel_workspace

          echo "===> 配置 apt 缓存目录"
          sudo mkdir -p "$APT_CACHE_DIR/partial"
          sudo chown -R "$USER:$USER" "$CACHE_ROOT" || true
          sudo chmod -R u+rwX "$CACHE_ROOT" || true
          sudo chmod -R 777 "$APT_CACHE_DIR" || true

          sudo apt-mark hold firefox || true
          sudo apt-mark hold libc-bin || true
          sudo apt purge -y man-db || true
          sudo rm -rf /var/lib/man-db/auto-update || true

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            -o Dir::Cache::archives="$APT_CACHE_DIR" \
            binutils \
            python-is-python3 \
            libssl-dev \
            libelf-dev \
            dos2unix \
            ccache \
            p7zip-full \
            zstd \
            aria2 \
            unzip \
            git \
            wget \
            curl \
            gh \
            patch

          echo "===> 正在拉取源码仓库..."
          if [ "${DEVICES_NAME}" = "realme_GT7pro" ] || [ "${DEVICES_NAME}" = "realme_GT7pro_Speed" ] || [ "${DEVICES_NAME}" = "realme_GT8" ]; then
            aria2c -s16 -x16 -k1M \
              https://github.com/realme-kernel-opensource/realme_GT8-AndroidB-common-source/archive/refs/heads/master.zip \
              -o common.zip
            unzip -q common.zip
            mv "realme_GT8-AndroidB-common-source-master" common
          elif [ "${DEVICES_NAME}" = "oneplus_ace5_ultra" ] || [ "${DEVICES_NAME}" = "realme_GT7" ]; then
            aria2c -s16 -x16 -k1M \
              "https://github.com/OnePlusOSS/android_kernel_oneplus_mt6991/archive/refs/heads/oneplus/${REPO_MANIFEST}.zip" \
              -o common.zip
            unzip -q common.zip
            mv "android_kernel_oneplus_mt6991-oneplus-${REPO_MANIFEST}" common
          else
            aria2c -s16 -x16 -k1M \
              "https://github.com/OnePlusOSS/android_kernel_common_oneplus_sm8750/archive/refs/heads/oneplus/${REPO_MANIFEST}.zip" \
              -o common.zip
            unzip -q common.zip
            mv "android_kernel_common_oneplus_sm8750-oneplus-${REPO_MANIFEST}" common
          fi
          rm -f common.zip

          echo "===> 恢复/下载 clang18 工具链"
          if [ ! -x "$TOOLCHAIN_CACHE_DIR/clang18/bin/clang" ]; then
            rm -rf "$TOOLCHAIN_CACHE_DIR/clang18"
            mkdir -p "$TOOLCHAIN_CACHE_DIR/clang18"
            aria2c -s16 -x16 -k1M \
              https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/clang-r510928.zip \
              -d "$TOOLCHAIN_CACHE_DIR" \
              -o clang.zip
            unzip -q "$TOOLCHAIN_CACHE_DIR/clang.zip" -d "$TOOLCHAIN_CACHE_DIR/clang18"
            rm -f "$TOOLCHAIN_CACHE_DIR/clang.zip"
          fi
          cp -a "$TOOLCHAIN_CACHE_DIR/clang18" ./clang18

          echo "===> 恢复/下载 build-tools"
          if [ ! -d "$TOOLCHAIN_CACHE_DIR/build-tools/bin" ]; then
            rm -rf "$TOOLCHAIN_CACHE_DIR/build-tools"
            mkdir -p "$TOOLCHAIN_CACHE_DIR"
            aria2c -s16 -x16 -k1M \
              https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip \
              -d "$TOOLCHAIN_CACHE_DIR" \
              -o build-tools.zip
            (
              cd "$TOOLCHAIN_CACHE_DIR"
              unzip -q build-tools.zip
              rm -f build-tools.zip
            )
          fi
          cp -a "$TOOLCHAIN_CACHE_DIR/build-tools" ./build-tools

          echo "===> 恢复/更新补丁与辅助仓库"

          if [ ! -d "$REPO_CACHE_DIR/oppo_oplus_realme_sm8750/.git" ]; then
            git clone --depth=1 https://github.com/cctv18/oppo_oplus_realme_sm8750.git "$REPO_CACHE_DIR/oppo_oplus_realme_sm8750"
          else
            git -C "$REPO_CACHE_DIR/oppo_oplus_realme_sm8750" fetch --depth=1 origin
            git -C "$REPO_CACHE_DIR/oppo_oplus_realme_sm8750" reset --hard origin/main || true
          fi

          if [ ! -d "$REPO_CACHE_DIR/susfs4oki/.git" ]; then
            git clone --depth=1 -b "${SUSFS_BRANCH}" https://github.com/cctv18/susfs4oki.git "$REPO_CACHE_DIR/susfs4oki"
          else
            git -C "$REPO_CACHE_DIR/susfs4oki" fetch --depth=1 origin "${SUSFS_BRANCH}"
            git -C "$REPO_CACHE_DIR/susfs4oki" reset --hard "origin/${SUSFS_BRANCH}" || true
          fi

          if [ ! -d "$REPO_CACHE_DIR/SCHED_PATCH_sm8750/.git" ]; then
            git clone --depth=1 -b "${SCHED_PATCH_SM8750_BRANCH}" https://github.com/Numbersf/SCHED_PATCH.git "$REPO_CACHE_DIR/SCHED_PATCH_sm8750"
          else
            git -C "$REPO_CACHE_DIR/SCHED_PATCH_sm8750" fetch --depth=1 origin "${SCHED_PATCH_SM8750_BRANCH}"
            git -C "$REPO_CACHE_DIR/SCHED_PATCH_sm8750" reset --hard "origin/${SCHED_PATCH_SM8750_BRANCH}" || true
          fi

          if [ ! -d "$REPO_CACHE_DIR/SCHED_PATCH_MT6991/.git" ]; then
            git clone --depth=1 -b "${SCHED_PATCH_MT6991_BRANCH}" https://github.com/Numbersf/SCHED_PATCH.git "$REPO_CACHE_DIR/SCHED_PATCH_MT6991"
          else
            git -C "$REPO_CACHE_DIR/SCHED_PATCH_MT6991" fetch --depth=1 origin "${SCHED_PATCH_MT6991_BRANCH}"
            git -C "$REPO_CACHE_DIR/SCHED_PATCH_MT6991" reset --hard "origin/${SCHED_PATCH_MT6991_BRANCH}" || true
          fi

          if [ ! -d "$REPO_CACHE_DIR/AnyKernel3/.git" ]; then
            git clone --depth=1 "https://github.com/${ANYKERNEL3_REPO}.git" "$REPO_CACHE_DIR/AnyKernel3"
          else
            git -C "$REPO_CACHE_DIR/AnyKernel3" fetch --depth=1 origin
            git -C "$REPO_CACHE_DIR/AnyKernel3" reset --hard origin/main || true
          fi

          if [ ! -d "$REPO_CACHE_DIR/Baseband-guard/.git" ]; then
            git clone --depth=1 https://github.com/vc-teahouse/Baseband-guard.git "$REPO_CACHE_DIR/Baseband-guard"
          else
            git -C "$REPO_CACHE_DIR/Baseband-guard" fetch --depth=1 origin
            git -C "$REPO_CACHE_DIR/Baseband-guard" reset --hard origin/main || true
          fi

          if [ ! -f "$FILE_CACHE_DIR/libfakestat.so" ]; then
            cp "$REPO_CACHE_DIR/oppo_oplus_realme_sm8750/lib/libfakestat.so" "$FILE_CACHE_DIR/libfakestat.so"
          fi
          if [ ! -f "$FILE_CACHE_DIR/libfaketimeMT.so" ]; then
            cp "$REPO_CACHE_DIR/oppo_oplus_realme_sm8750/lib/libfaketimeMT.so" "$FILE_CACHE_DIR/libfaketimeMT.so"
          fi

          echo "===> 所有源码及工具链初始化完成"
          echo "===> 正在去除 ABI 保护 & 去除 dirty 后缀..."
          rm -f common/android/abi_gki_protected_exports_* || true
          for f in common/scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
          done

      - name: 🔧 Fix dependency cache permissions (修正依赖缓存权限)
        if: always()
        run: |
          mkdir -p "$HOME/.cache/build_oneplus/apt-archives"
          sudo chown -R "$USER:$USER" "$HOME/.cache/build_oneplus" || true
          rm -f "$HOME/.cache/build_oneplus/apt-archives/lock" || true
          rm -rf "$HOME/.cache/build_oneplus/apt-archives/partial" || true

      - name: 📦 Save dependency caches (保存依赖缓存)
        if: ${{ steps.deps-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cache/build_oneplus/apt-archives/*.deb
            ~/.cache/build_oneplus/toolchains/clang18
            ~/.cache/build_oneplus/toolchains/build-tools
            ~/.cache/build_oneplus/repos/oppo_oplus_realme_sm8750
            ~/.cache/build_oneplus/repos/susfs4oki
            ~/.cache/build_oneplus/repos/SCHED_PATCH_sm8750
            ~/.cache/build_oneplus/repos/SCHED_PATCH_MT6991
            ~/.cache/build_oneplus/repos/AnyKernel3
            ~/.cache/build_oneplus/repos/Baseband-guard
            ~/.cache/build_oneplus/files/libfakestat.so
            ~/.cache/build_oneplus/files/libfaketimeMT.so
          key: deps-${{ runner.os }}-${{ env.DEPS_CACHE_VERSION }}-${{ env.CLANG18_VERSION }}-${{ env.BUILD_TOOLS_VERSION }}-${{ env.SUSFS_BRANCH }}

      - name: 🛠 Set ccache DIR(配置ccache目录)
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_${KSU_TYPE}_${DEVICES_NAME}" >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=10G" >> "$GITHUB_ENV"
          echo "当前磁盘空间："
          df -h
          echo "当前构建内核机型：${DEVICES_NAME}"

      - name: 📥 Restore ccache (载入当前机型的ccache缓存)
        id: ccache-restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ env.KSU_TYPE }}-${{ env.DEVICES_NAME }}-latest
          restore-keys: |
            ccache-${{ env.KSU_TYPE }}-${{ env.DEVICES_NAME }}-

      - name: 🔎 Find public ccache in releases (查找公共缓存)
        id: public-ccache
        if: ${{ steps.ccache-restore.outputs.cache-matched-key == '' }}
        uses: actions/github-script@v8
        env:
          PUBLIC_CACHE_REPO: ${{ vars.PUBLIC_CACHE_REPO }}
          PUBLIC_CACHE_TAG: ${{ vars.PUBLIC_CACHE_TAG }}
          DEVICE_NAME: ${{ env.DEVICES_NAME }}
        with:
          script: |
            const repoName = process.env.PUBLIC_CACHE_REPO || 'showdo/Build_Oneplus_Realme_Action';
            const releaseTag = process.env.PUBLIC_CACHE_TAG || 'Public_Ccache_SM8750';
            const [owner, repo] = repoName.split('/');
            const deviceName = process.env.DEVICE_NAME;
            let selected = null;

            const escapeRegex = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const exactAssetName = `ccache-${deviceName}.tar.zst`;
            const legacyAssetPattern = new RegExp(`^ccache-(.+-)?${escapeRegex(deviceName)}(-[0-9]+)?\\.tar\\.zst$`);

            core.info(`当前仓库无匹配 ccache，开始按机型查找公共缓存: ${deviceName}`);
            core.info(`缓存来源仓库: ${owner}/${repo}`);
            core.info(`缓存来源标签: ${releaseTag}`);
            core.info(`优先匹配公共缓存文件: ${exactAssetName}`);

            let release;
            try {
              const response = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: releaseTag,
              });
              release = response.data;
            } catch (error) {
              core.info(`未找到公共缓存 release: ${releaseTag}`);
              return;
            }

            for (const asset of release.assets || []) {
              const isExactMatch = asset.name === exactAssetName;
              const isLegacyMatch = legacyAssetPattern.test(asset.name);
              if (isExactMatch || isLegacyMatch) {
                const shouldReplace =
                  !selected ||
                  (isExactMatch && !selected.exact) ||
                  (isExactMatch === selected.exact && new Date(asset.updated_at) > new Date(selected.updated_at));

                if (shouldReplace) {
                  selected = {
                    name: asset.name,
                    updated_at: asset.updated_at,
                    tag: release.tag_name,
                    repo: `${owner}/${repo}`,
                    exact: isExactMatch,
                  };
                }
              }
            }

            if (!selected) {
              core.info('未找到可用的公共 ccache 资产，将使用空缓存继续构建');
              return;
            }

            core.info(`找到公共缓存: ${selected.name} (${selected.repo}@${selected.tag})`);
            core.setOutput('asset-name', selected.name);
            core.setOutput('release-tag', selected.tag);
            core.setOutput('source-repo', selected.repo);

      - name: 📦 Restore public ccache from releases (恢复公共缓存)
        if: ${{ steps.ccache-restore.outputs.cache-matched-key == '' && steps.public-ccache.outputs.asset-name != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLIC_CACHE_REPO: ${{ steps.public-ccache.outputs.source-repo }}
          PUBLIC_CACHE_TAG: ${{ steps.public-ccache.outputs.release-tag }}
          PUBLIC_CACHE_ASSET: ${{ steps.public-ccache.outputs.asset-name }}
        run: |
          set -euo pipefail
          echo "当前仓库无匹配缓存，开始下载公共缓存: $PUBLIC_CACHE_ASSET"
          rm -f "$PUBLIC_CACHE_ASSET"
          rm -rf "$CCACHE_DIR"
          gh release download "$PUBLIC_CACHE_TAG" --repo "$PUBLIC_CACHE_REPO" --pattern "$PUBLIC_CACHE_ASSET" --dir .
          TEMP_EXTRACT_DIR="$(mktemp -d)"
          tar --use-compress-program=unzstd -xf "$PUBLIC_CACHE_ASSET" -C "$TEMP_EXTRACT_DIR"
          EXTRACTED_CCACHE_DIR="$(find "$TEMP_EXTRACT_DIR" -maxdepth 1 -mindepth 1 -type d -name '.ccache_*' | head -n 1)"
          if [ -z "$EXTRACTED_CCACHE_DIR" ]; then
            echo "::error::公共缓存解压后未找到 .ccache_* 目录"
            exit 1
          fi

          mkdir -p "$CCACHE_DIR"
          shopt -s dotglob nullglob
          mv "$EXTRACTED_CCACHE_DIR"/* "$CCACHE_DIR"/
          shopt -u dotglob nullglob
          rm -rf "$TEMP_EXTRACT_DIR"
          test -d "$CCACHE_DIR"
          ls -lah "$CCACHE_DIR" | head -n 20
          echo "PUBLIC_CCACHE_USED=true" >> "$GITHUB_ENV"
          echo "公共缓存恢复完成: $CCACHE_DIR"

      - name: 📥 Init ccache (初始化配置ccache)
        run: |
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${GITHUB_WORKSPACE}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${CCACHE_DIR}"
          export CCACHE_MAXSIZE="${CCACHE_MAXSIZE}"

          mkdir -p "$CCACHE_DIR"

          echo "配置ccache缓存大小为: $CCACHE_MAXSIZE"
          ccache -M "$CCACHE_MAXSIZE"
          ccache -o compression=true

          echo "ccache初始状态:"
          ccache -s

          if [ -n "${{ steps.ccache-restore.outputs.cache-matched-key }}" ]; then
            echo "ccache缓存命中详情: ${{ steps.ccache-restore.outputs.cache-matched-key }}"
            ccache -sv
          elif [ "${PUBLIC_CCACHE_USED:-false}" = 'true' ]; then
            echo "已恢复公共 ccache，当前缓存详情:"
            ccache -sv
          else
            echo "未命中仓库缓存，也未找到公共缓存，将从空缓存开始构建"
          fi

      - name: 🛠 Set SerialID Check (添加SerialID校验)
        if: ${{ env.ENABLE_SERIALID_CHECK == 'true' }}
        working-directory: kernel_workspace/common
        run: |
          if grep -q 'SOC_SN_CHECK' init/main.c; then
            echo "main.c 已包含, 跳过"
            exit 0
          else
            cp "${GITHUB_WORKSPACE}/.github/workflows/tools/serialid_check.c" ./
            LINE=$(grep -n '^#include' init/main.c | tail -n 1 | cut -d: -f1)
            head -n "$LINE" init/main.c > init/main.c.patched
            cat serialid_check.c >> init/main.c.patched
            tail -n +$((LINE+1)) init/main.c >> init/main.c.patched
            mv init/main.c.patched init/main.c
            echo "已自动插入 serialid_check.c 到 main.c"
          fi

      - name: 🔧 Add Re-Kernel Support (添加 Re-Kernel 支持)
        if: ${{ env.ENABLE_REKERNEL == 'true' }}
        working-directory: kernel_workspace/common
        run: |
          echo "开始添加 Re-Kernel 支持..."
          PATCH_FILE="${GITHUB_WORKSPACE}/.github/workflows/tools/Re-Kernel_Support.patch"

          if [ ! -f "$PATCH_FILE" ]; then
            echo "::error::未找到 Re-Kernel 补丁文件：$PATCH_FILE"
            exit 1
          fi

          if grep -q "Re-Kernel" init/main.c 2>/dev/null || grep -q "re_kernel" init/main.c 2>/dev/null; then
            echo "✓ Re-Kernel 支持已存在，跳过应用补丁"
          else
            cp "$PATCH_FILE" ./Re-Kernel_Support.patch
            echo "正在应用 Re-Kernel 补丁..."
            if patch -p1 -N --ignore-whitespace -F 3 < Re-Kernel_Support.patch 2>&1 | tee /tmp/patch.log; then
              echo "✓ Re-Kernel 补丁应用成功"
            else
              echo "::warning::Re-Kernel 补丁应用出现问题，检查日志..."
              if grep -q "malformed patch" /tmp/patch.log; then
                echo "::warning::补丁文件格式问题，尝试强制应用..."
                patch -p1 -N --force --ignore-whitespace < Re-Kernel_Support.patch || true
                echo "✓ Re-Kernel 补丁已尽力应用，请手动验证"
              else
                echo "::warning::Re-Kernel 补丁应用失败"
                cat /tmp/patch.log
                exit 1
              fi
            fi
            rm -f Re-Kernel_Support.patch
          fi

          echo "CONFIG_REKERNEL=y" >> arch/arm64/configs/gki_defconfig

      - name: 🔧 Add lz4armv8 Acceleration Support (添加 lz4armv8 硬件加速支持)
        working-directory: kernel_workspace/common
        run: |
          echo "开始添加 LZ4 ARM64 硬件加速支持..."
          PATCH_FILE="${GITHUB_WORKSPACE}/.github/workflows/tools/lz4armv8_support.patch"

          if [ ! -f "$PATCH_FILE" ]; then
            echo "::error::未找到 LZ4 ARM64 补丁文件：$PATCH_FILE"
            exit 1
          fi

          if [ -f "fs/f2fs/lz4armv8/lz4accel.c" ]; then
            echo "✓ LZ4 ARM64 加速文件已存在，跳过应用补丁"
          else
            cp "$PATCH_FILE" ./lz4armv8_support.patch
            echo "正在应用 LZ4 ARM64 硬件加速补丁..."
            if patch -p1 --ignore-whitespace -F 3 < lz4armv8_support.patch 2>&1 | tee /tmp/lz4_patch.log; then
              echo "✓ LZ4 ARM64 补丁应用成功"
            else
              echo "::warning::LZ4 ARM64 补丁应用出现问题，检查日志..."
              if grep -q "malformed patch\|patch failed" /tmp/lz4_patch.log; then
                echo "::warning::补丁文件格式问题或冲突，尝试强制应用..."
                patch -p1 --force --ignore-whitespace < lz4armv8_support.patch || true
                echo "✓ LZ4 ARM64 补丁已尽力应用"
              else
                echo "::error::LZ4 ARM64 补丁应用失败"
                cat /tmp/lz4_patch.log
                exit 1
              fi
            fi
            rm -f lz4armv8_support.patch
          fi

          echo "正在配置 LZ4 硬件加速相关选项..."
          if ! grep -q "CONFIG_F2FS_COMPRESSION=y" arch/arm64/configs/gki_defconfig; then
            echo "CONFIG_F2FS_COMPRESSION=y" >> arch/arm64/configs/gki_defconfig
          fi

          if ! grep -q "CONFIG_KERNEL_MODE_NEON=y" arch/arm64/configs/gki_defconfig; then
            echo "CONFIG_KERNEL_MODE_NEON=y" >> arch/arm64/configs/gki_defconfig
          fi

          echo "✓ LZ4 ARM64 硬件加速支持配置完成"

      - name: 🔧 Add adios_ioscheduler (添加 adios_ioscheduler)
        if: ${{ env.ENABLE_ADIOS == 'true' }}
        working-directory: kernel_workspace/common
        run: |
          echo "开始添加 ADIOS I/O 调度器支持..."
          PATCH_FILE="${GITHUB_WORKSPACE}/.github/workflows/tools/adios_ioscheduler.patch"

          if [ ! -f "$PATCH_FILE" ]; then
            echo "::error::未找到 ADIOS I/O 调度器补丁文件"
            exit 1
          fi

          if [ -f "block/adios.c" ]; then
            echo "✓ ADIOS I/O 调度器文件已存在，跳过应用补丁"
          else
            cp "$PATCH_FILE" ./adios_ioscheduler.patch
            echo "正在应用 ADIOS I/O 调度器补丁..."
            if patch -p1 --ignore-whitespace -F 3 < adios_ioscheduler.patch 2>&1 | tee /tmp/adios_patch.log; then
              echo "✓ ADIOS I/O 调度器补丁应用成功"
            else
              echo "::warning::ADIOS 补丁应用出现问题"
              if grep -q "malformed patch" /tmp/adios_patch.log; then
                patch -p1 --force --ignore-whitespace < adios_ioscheduler.patch || true
              fi
            fi
            rm -f adios_ioscheduler.patch
          fi

          if ! grep -q "CONFIG_MQ_IOSCHED_ADIOS" arch/arm64/configs/gki_defconfig; then
            echo "CONFIG_MQ_IOSCHED_ADIOS=y" >> arch/arm64/configs/gki_defconfig
            echo "CONFIG_MQ_IOSCHED_DEFAULT_ADIOS=y" >> arch/arm64/configs/gki_defconfig
          fi
          echo "✓ ADIOS I/O 调度器支持配置完成"

      - name: 🔧 apply lz4 1.10.0 & zstd 1.5.7 patches (添加lz4 1.10.0 & zstd 1.5.7补丁)
        run: |
          echo "正在添加 lz4 1.10.0 & zstd 1.5.7 补丁…"
          cd kernel_workspace
          cp -a "$HOME/.cache/build_oneplus/repos/oppo_oplus_realme_sm8750" ./oppo_oplus_realme_sm8750
          cp ./oppo_oplus_realme_sm8750/zram_patch/001-lz4.patch ./common/
          cp ./oppo_oplus_realme_sm8750/zram_patch/lz4armv8.S ./common/lib/
          cp ./oppo_oplus_realme_sm8750/zram_patch/002-zstd.patch ./common/
          cd ./common
          git apply -p1 < 001-lz4.patch || true
          patch -p1 < 002-zstd.patch || true

      - name: 🔧 Set Baseband-guard (开启BBG基带守护)
        if: ${{ env.ENABLE_BBG == 'true' }}
        run: |
          echo "正在启用内核级基带保护支持…"
          cd kernel_workspace
          cp -a "$HOME/.cache/build_oneplus/repos/Baseband-guard" ./Baseband-guard
          chmod +x ./Baseband-guard/setup.sh
          bash ./Baseband-guard/setup.sh
          echo "CONFIG_BBG=y" >> ./common/arch/arm64/configs/gki_defconfig
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/lockdown/lockdown,baseband_guard/ } }' ./common/security/Kconfig

      - name: ⚙️ Set ${{ env.KSU_TYPE }} (设置${{ env.KSU_TYPE }})
        run: |
          cd kernel_workspace
          echo "正在配置${KSU_TYPE}..."

          if [ "${KSU_TYPE}" = 'ReSukiSU' ]; then
            curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main
            cd ./KernelSU
            KSU_VERSION=$(expr "$(git rev-list --count main)" + 30700 2>/dev/null || echo 114514)
            echo "KSUVER=$KSU_VERSION" >> "$GITHUB_ENV"
          else
            curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s builtin
            cd ./KernelSU
            GIT_COMMIT_HASH=$(git rev-parse --short=8 HEAD)
            echo "当前提交哈希: $GIT_COMMIT_HASH"

            for i in {1..3}; do
              KSU_API_VERSION=$(curl -s "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/builtin/kernel/Kbuild" | \
                grep -m1 "KSU_VERSION_API :=" | \
                awk -F'= ' '{print $2}' | \
                tr -d '[:space:]')
              [ -n "$KSU_API_VERSION" ] && break || sleep 1
            done
            [ -z "$KSU_API_VERSION" ] && KSU_API_VERSION="4.1.0"

            echo "KSU_API_VERSION=$KSU_API_VERSION" >> "$GITHUB_ENV"

            VERSION_DEFINITIONS=$'define get_ksu_version_full\nv\\$1-'"$GIT_COMMIT_HASH"$'-TG@qdykernel\nendef\n\nKSU_VERSION_API := '"$KSU_API_VERSION"$'\nKSU_VERSION_FULL := v'"$KSU_API_VERSION"$'-'"$GIT_COMMIT_HASH"$'-TG@qdykernel'

            sed -i '/define get_ksu_version_full/,/endef/d' kernel/Kbuild
            sed -i '/KSU_VERSION_API :=/d' kernel/Kbuild
            sed -i '/KSU_VERSION_FULL :=/d' kernel/Kbuild
            awk -v def="$VERSION_DEFINITIONS" '
              /REPO_OWNER :=/ {print; print def; inserted=1; next}
              1
              END {if (!inserted) print def}
            ' kernel/Kbuild > kernel/Kbuild.tmp && mv kernel/Kbuild.tmp kernel/Kbuild

            KSU_VERSION=$(expr "$(git rev-list --count main)" + 37185 2>/dev/null || echo 114514)
            echo "KSUVER=$KSU_VERSION" >> "$GITHUB_ENV"
            grep -A10 "REPO_OWNER" kernel/Kbuild
            grep "KSU_VERSION_FULL" kernel/Kbuild
            echo "SukiSU版本号: v${KSU_API_VERSION}-${GIT_COMMIT_HASH}-TG@qdykernel"
          fi

      - name: 🔧 Set up SUSFS (配置 SUSFS)
        if: ${{ env.ENABLE_SUSFS == 'true' }}
        run: |
          cd kernel_workspace
          cp -a "$HOME/.cache/build_oneplus/repos/susfs4oki" ./susfs4ksu
          cp "$HOME/.cache/build_oneplus/repos/oppo_oplus_realme_sm8750/other_patch/69_hide_stuff.patch" ./common/69_hide_stuff.patch
          cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch ./common/
          cp ./susfs4ksu/kernel_patches/fs/* ./common/fs/
          cp ./susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
          cd ./common
          patch -p1 < 50_add_susfs_in_gki-android15-6.6.patch || true
          patch -p1 -N -F 3 < 69_hide_stuff.patch || true
          echo "[OK] SUSFS 补丁处理流程全部完成"

      - name: 🔧 Set gki_defconfig (设置编译配置)
        run: |
          cd kernel_workspace
          echo "CONFIG_KSU=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KPM=y" >> ./common/arch/arm64/configs/gki_defconfig

          if [ "${KSU_TYPE}" = 'ReSukiSU' ]; then
            echo 'CONFIG_KSU_FULL_NAME_FORMAT="%TAG_NAME%-%COMMIT_SHA%-Re-TG@qdykernel"' >> ./common/arch/arm64/configs/gki_defconfig
          fi

          if [ "${ENABLE_SUSFS}" = 'true' ]; then
            echo "CONFIG_KSU_SUSFS=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> ./common/arch/arm64/configs/gki_defconfig
          else
            echo "未启用SUSFS，跳过SUSFS配置"
          fi

          echo "CONFIG_TMPFS_XATTR=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> ./common/arch/arm64/configs/gki_defconfig

          sudo sed -i 's/check_defconfig//' ./common/build.config.gki

      - name: 🔧 Set Kernel name (设置内核名称)
        run: |
          cd kernel_workspace
          echo "内核后缀: $DEFAULT_SUFFIX"
          ESCAPED_SUFFIX=$(printf '%s\n' "$DEFAULT_SUFFIX" | sed 's:[\/&]:\\&:g')
          sudo sed -i "s/-4k/$ESCAPED_SUFFIX/g" ./common/arch/arm64/configs/gki_defconfig
          sed -i 's/${scm_version}//' ./common/scripts/setlocalversion

      - name: 🔧 Apply Sched Patch (应用完美风驰补丁)
        run: |
          if [ "${ENABLE_SCX}" = "true" ]; then
            if [ "$SCHED_FILE" = "none" ]; then
              echo "该机型自带风驰，跳过应用补丁"
            else
              cd kernel_workspace/common
              if [ "${DEVICES_NAME}" = "oneplus_ace5_ultra" ] || [ "${DEVICES_NAME}" = "realme_GT7" ]; then
                cp -a "$HOME/.cache/build_oneplus/repos/SCHED_PATCH_MT6991" ./SCHED_PATCH
              else
                cp -a "$HOME/.cache/build_oneplus/repos/SCHED_PATCH_sm8750" ./SCHED_PATCH
              fi

              echo "正在拉取风驰补丁"
              cp "./SCHED_PATCH/fengchi_${SCHED_FILE}.patch" ./

              if [[ -f "fengchi_${SCHED_FILE}.patch" ]]; then
                echo "开始应用风驰补丁"
                dos2unix "fengchi_${SCHED_FILE}.patch"
                patch -p1 -F 3 < "fengchi_${SCHED_FILE}.patch"
                echo "完美风驰补丁应用完成"
              else
                echo "❌ 未匹配到补丁，风驰补丁暂未支持该机型"
                exit 11
              fi
            fi
          else
            echo "未启用风驰，则需应用OGKI转换GKI补丁"
            cd kernel_workspace/common
            sed -i '1iobj-y += hmbird_patch.o' drivers/Makefile
            cp "${GITHUB_WORKSPACE}/.github/workflows/Bin/hmbird_patch.patch" ./hmbird_patch.patch
            echo "正在打 OGKI 转换 GKI 补丁"
            patch -p1 -F 3 < hmbird_patch.patch
            echo "OGKI 转换 GKI patch 完成"
          fi

      - name: 📥 Start build timer (构建计时开始)
        run: |
          echo "BUILD_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: 🔨 Build Kernel (构建内核)
        run: |
          set -euo pipefail

          WORKDIR="$(pwd)"
          export PATH="/usr/lib/ccache:$PATH"
          export PATH="$WORKDIR/kernel_workspace/clang18/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"

          CLANG_DIR="$WORKDIR/kernel_workspace/clang18/bin"
          echo "clang版本：$($CLANG_DIR/clang --version | head -n 1)"
          echo "ld.lld版本：$($CLANG_DIR/ld.lld --version | head -n 1)"

          pahole_version=$(pahole --version 2>/dev/null | head -n1 || true)
          [ -z "$pahole_version" ] && echo "pahole版本：未安装" || echo "pahole版本：$pahole_version"

          export CCACHE_LOGFILE="${GITHUB_WORKSPACE}/kernel_workspace/ccache.log"
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${GITHUB_WORKSPACE}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${CCACHE_DIR}"
          export CCACHE_MAXSIZE="3G"

          mkdir -p "$CCACHE_DIR"
          echo "sloppiness = file_stat_matches,include_file_ctime,include_file_mtime,pch_defines,file_macro,time_macros" >> "$CCACHE_DIR/ccache.conf"

          cd kernel_workspace/common

          cp "$HOME/.cache/build_oneplus/files/libfakestat.so" .
          cp "$HOME/.cache/build_oneplus/files/libfaketimeMT.so" .
          chmod 777 ./*.so

          export FAKESTAT="2025-05-25 12:00:00"
          export FAKETIME="@2025-05-25 13:00:00"
          echo "FAKESTAT=$FAKESTAT" >> "$GITHUB_ENV"
          echo "FAKETIME=$FAKETIME" >> "$GITHUB_ENV"

          SO_DIR=$(pwd)
          export PRELOAD_LIBS="$SO_DIR/libfakestat.so $SO_DIR/libfaketimeMT.so"

          cat > cc-wrapper <<EOF
          #!/bin/bash
          export LD_PRELOAD="$PRELOAD_LIBS"
          export FAKESTAT="$FAKESTAT"
          export FAKETIME="$FAKETIME"
          ccache clang "\$@"
          EOF

          cat > ld-wrapper <<EOF
          #!/bin/bash
          export LD_PRELOAD="$PRELOAD_LIBS"
          export FAKESTAT="$FAKESTAT"
          export FAKETIME="$FAKETIME"
          ld.lld "\$@"
          EOF

          cat > test-wrapper.sh <<EOF
          #!/bin/bash
          export LD_PRELOAD="$PRELOAD_LIBS"
          export FAKESTAT="$FAKESTAT"
          export FAKETIME="$FAKETIME"
          echo ">>> Wrapper 内部环境检查完毕."
          exec "\$@"
          EOF

          chmod +x test-wrapper.sh cc-wrapper ld-wrapper
          ./test-wrapper.sh date
          ./test-wrapper.sh stat ./Makefile
          LD_PRELOAD="$PRELOAD_LIBS" stat ./Makefile

          export KBUILD_BUILD_TIMESTAMP="${KERNEL_TIME}"

          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &
          wait || true

          make -j"$(nproc --all)" LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error gki_defconfig

          make -j"$(nproc --all)" LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC="$(pwd)/cc-wrapper" LD="$(pwd)/ld-wrapper" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error Image

          LD_PRELOAD="$PRELOAD_LIBS" stat ./Makefile
          echo "ccache状态："
          ccache -s

      - name: 🕒 Calculate build time (计算构建时间)
        run: |
          END=$(date +%s)
          TIME=$((END - BUILD_START))
          echo "BUILD_TIME=$TIME" >> "$GITHUB_ENV"
          echo "Build time: $TIME seconds"

      - name: 📥 Save ccache if needed (构建时间较长或首次落地本地缓存时保存)
        if: ${{ fromJSON(env.BUILD_TIME || '0') > 480 || steps.ccache-restore.outputs.cache-matched-key == '' }}
        uses: actions/cache/save@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ env.KSU_TYPE }}-${{ env.DEVICES_NAME }}-${{ github.run_id }}

      - name: 🧹 Clean old ccache (清理旧缓存)
        if: ${{ fromJSON(env.BUILD_TIME || '0') > 480 }}
        uses: actions/github-script@v8
        env:
          PREFIX: ccache-${{ env.KSU_TYPE }}-${{ env.DEVICES_NAME }}
          CURRENT_KEY: ccache-${{ env.KSU_TYPE }}-${{ env.DEVICES_NAME }}-${{ github.run_id }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const prefix = process.env.PREFIX;
            const currentKey = process.env.CURRENT_KEY;
            let page = 1;
            let deleted = 0;

            core.info('构建时间超过8分钟，已保存ccache缓存');
            core.info(`正在清理旧缓存，匹配前缀: ${prefix}`);

            while (true) {
              const response = await github.rest.actions.getActionsCacheList({
                owner,
                repo,
                per_page: 100,
                page,
              });

              const caches = response.data.actions_caches || [];
              if (caches.length === 0) break;

              for (const cache of caches) {
                if (cache.key.startsWith(prefix) && cache.key !== currentKey) {
                  core.info(`Deleting cache: ${cache.key} (ID: ${cache.id})`);
                  await github.rest.actions.deleteActionsCacheById({
                    owner,
                    repo,
                    cache_id: cache.id,
                  });
                  deleted++;
                }
              }

              if (caches.length < 100) break;
              page++;
            }

            core.info(`旧缓存清理完成，共删除 ${deleted} 个缓存`);

      - name: 📦 ReName Image (修改镜像名)
        run: |
          cd kernel_workspace/common/out/arch/arm64/boot
          cp ./Image "./${IMAGENAME}"

      - name: 📤 Upload Image (上传 Image)
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.IMAGENAME }}
          path: kernel_workspace/common/out/arch/arm64/boot/${{ env.IMAGENAME }}

      - name: 📦 Make AnyKernel3 (创建Anykernel3)
        run: |
          rm -rf ./AnyKernel3
          cp -a "$HOME/.cache/build_oneplus/repos/AnyKernel3" ./AnyKernel3
          rm -rf ./AnyKernel3/.git
          rm -rf ./AnyKernel3/push.sh
          cp kernel_workspace/common/out/arch/arm64/boot/Image ./AnyKernel3/
          7z a -t7z -p'501b10728d2cb08abe16eb8b0bdee33c9d2382e1' -mhe=on "./AnyKernel3/TG频道@qdykernel.7z" ./AnyKernel3/Image
          rm -rf ./AnyKernel3/Image

      - name: 📤 Upload AnyKernel3 (上传 Anykernel3)
        uses: actions/upload-artifact@v5
        with:
          name: AK3_${{ env.KSUVER }}_${{ env.DEVICES_NAME }}
          path: ./AnyKernel3/*