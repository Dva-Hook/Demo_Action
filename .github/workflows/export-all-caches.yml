name: export-all-ccaches

on:
  workflow_dispatch:
    inputs:
      filter_pattern:
        description: "可选：按关键词过滤缓存（留空则导出全部），例如 oneplus_13"
        required: false
        default: ""

      upload_to_releases:
        description: "是否同时上传到指定仓库的 Releases"
        required: false
        default: false
        type: boolean

      target_repo:
        description: "目标仓库 (格式: owner/repo)，仅在上方勾选时生效"
        required: false
        default: ""

      target_token:
        description: "目标仓库的 PAT (Classic: 需repo作用域 / Fine-grained: 需Contents读写)，仅在上方勾选时生效"
        required: false
        default: ""

permissions:
  contents: read
  actions: read

jobs:
  list-caches:
    runs-on: ubuntu-latest
    outputs:
      cache_keys: ${{ steps.list.outputs.cache_keys }}
      cache_count: ${{ steps.list.outputs.cache_count }}

    steps:
      - name: 列出所有ccache缓存
        id: list
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const filterPattern = '${{ github.event.inputs.filter_pattern }}'.trim();
            const allCaches = [];
            let page = 1;

            while (true) {
              const response = await github.rest.actions.getActionsCacheList({
                owner,
                repo,
                per_page: 100,
                page: page
              });

              if (response.data.actions_caches.length === 0) break;

              for (const cache of response.data.actions_caches) {
                if (cache.key.startsWith('ccache-')) {
                  if (!filterPattern || cache.key.includes(filterPattern)) {
                    allCaches.push(cache.key);
                  }
                }
              }

              if (response.data.actions_caches.length < 100) break;
              page++;
            }

            core.setOutput('cache_keys', JSON.stringify(allCaches));
            core.setOutput('cache_count', allCaches.length);
            console.log(`共找到 ${allCaches.length} 个ccache缓存`);
            allCaches.forEach(k => console.log(`  - ${k}`));

  export:
    needs: list-caches
    if: fromJson(needs.list-caches.outputs.cache_count) > 0
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cache_key: ${{ fromJson(needs.list-caches.outputs.cache_keys) }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 解析cache key
        id: parse
        shell: bash
        run: |
          set -euo pipefail
          CACHE_KEY='${{ matrix.cache_key }}'
          CACHE_BODY="${CACHE_KEY#ccache-}"
          RUN_ID="${CACHE_BODY##*-}"
          CACHE_SCOPE="${CACHE_BODY%-${RUN_ID}}"
          KSU_TYPE="${CACHE_SCOPE%%-*}"
          TARGET="${CACHE_SCOPE#${KSU_TYPE}-}"
          CCACHE_DIR="$HOME/.ccache_${KSU_TYPE}_${TARGET}"
          ARCHIVE_NAME="${CACHE_KEY}.tar.zst"

          echo "CACHE_KEY=$CACHE_KEY" >> "$GITHUB_ENV"
          echo "KSU_TYPE=$KSU_TYPE" >> "$GITHUB_ENV"
          echo "TARGET=$TARGET" >> "$GITHUB_ENV"
          echo "CCACHE_DIR=$CCACHE_DIR" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"

          echo "正在处理: $CACHE_KEY"
          echo "KSU类型: $KSU_TYPE"
          echo "目标: $TARGET"
          echo "缓存目录: $CCACHE_DIR"

      - name: 安装打包工具
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends zstd

      - name: 恢复缓存
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CACHE_KEY }}
          fail-on-cache-miss: true

      - name: 打包缓存
        shell: bash
        run: |
          set -euo pipefail
          tar --use-compress-program='zstd -T0 -19' -cf "${{ env.ARCHIVE_NAME }}" -C "$HOME" "$(basename "${{ env.CCACHE_DIR }}")"
          ls -lh "${{ env.ARCHIVE_NAME }}"

      # - name: 上传导出包
      #   uses: actions/upload-artifact@v5
      #   with:
      #     name: exported-${{ env.CACHE_KEY }}
      #     path: ${{ env.ARCHIVE_NAME }}
      #     if-no-files-found: error

      - name: 上传到目标 Releases
        if: ${{ github.event.inputs.upload_to_releases == 'true' && github.event.inputs.target_repo != '' && github.event.inputs.target_token != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.event.inputs.target_token }}
          TARGET_REPO: ${{ github.event.inputs.target_repo }}
        run: |
          set -euo pipefail
          RELEASE_TAG="exported-ccaches"
          UPLOAD_NAME="ccache-${TARGET}.tar.zst"
          if [ "${ARCHIVE_NAME}" != "${UPLOAD_NAME}" ]; then
            echo "重命名: ${ARCHIVE_NAME} → ${UPLOAD_NAME}"
            cp "${ARCHIVE_NAME}" "${UPLOAD_NAME}"
          fi

          echo "正在上传 ${UPLOAD_NAME} 到 ${TARGET_REPO}@${RELEASE_TAG} ..."

          if ! gh release view "$RELEASE_TAG" --repo "$TARGET_REPO" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} 不存在，正在创建..."
            RELEASE_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d-%H:%M')
            RELEASE_NOTES="📱 GKI/OKI_6.x全版本内核公共ccache缓存\n更新时间: ${RELEASE_TIME}"
            gh release create "$RELEASE_TAG" --repo "$TARGET_REPO" --title "Exported Ccache Archives" --notes "$RELEASE_NOTES"
          fi

          gh release upload "$RELEASE_TAG" "${UPLOAD_NAME}" --repo "$TARGET_REPO" --clobber
          echo "上传完成！"
